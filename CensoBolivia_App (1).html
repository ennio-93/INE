<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Censo Comunidades · Bolivia</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#13201c; --paper:#f6f4ee; --card:#fffdfa; --line:#e3e1d4;
    --agua:#1f7a8c; --agua-d:#155e6d; --agua-l:#cfeaf0;
    --tierra:#b56b45; --verde:#5c8a3a; --sol:#dba017; --rojo:#c44536;
    --muted:#707a73; --shadow:0 2px 10px rgba(19,32,28,.08);
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.4;
    -webkit-font-smoothing:antialiased;height:100%;overflow:hidden;
    display:flex;flex-direction:column;
  }
  button,select,input{font-family:inherit}
  header{
    background:linear-gradient(135deg,var(--agua) 0%,var(--agua-d) 100%);
    color:#fff;padding:calc(10px + var(--safe-t)) 16px 10px;flex:0 0 auto;
    box-shadow:0 2px 14px rgba(19,32,28,.18);position:relative;z-index:60;
  }
  header h1{font-size:1.08rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
  header .sub{font-size:.7rem;opacity:.82;margin-top:1px}
  .tabs{display:flex;background:rgba(0,0,0,.18);border-radius:9px;padding:3px;margin-top:9px;gap:3px}
  .tab{flex:1;text-align:center;padding:7px 0;border-radius:7px;font-size:.78rem;font-weight:600;
    color:rgba(255,255,255,.75);cursor:pointer;border:none;background:transparent;transition:.15s}
  .tab.activo{background:#fff;color:var(--agua-d)}
  .filtros{background:var(--card);border-bottom:1px solid var(--line);padding:9px 12px;
    display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;flex:0 0 auto;z-index:55;-webkit-overflow-scrolling:touch}
  .filtros::-webkit-scrollbar{display:none}
  .campo{display:flex;flex-direction:column;gap:2px;flex:0 0 auto;min-width:118px}
  .campo.buscar{flex:1;min-width:130px}
  .campo label{font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .campo select,.campo input{padding:6px 8px;border:1px solid var(--line);border-radius:7px;
    background:#fff;font-size:.8rem;color:var(--ink);max-width:140px}
  .campo.buscar input{max-width:none;width:100%}
  .campo select:focus,.campo input:focus{outline:2px solid var(--agua-l);border-color:var(--agua)}
  .btn-limpiar{flex:0 0 auto;padding:6px 11px;background:var(--tierra);color:#fff;border:none;border-radius:7px;
    font-size:.76rem;font-weight:700;align-self:flex-end;height:31px}
  main{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
  .vista{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:calc(14px + var(--safe-b))}
  .vista.activa{display:block}
  #vMapa{display:none;flex:1;position:relative}
  #vMapa.activa{display:flex}
  #mapaEl{flex:1;width:100%}
  .mapa-resumen{position:absolute;top:10px;left:10px;right:10px;z-index:30;
    background:rgba(255,253,250,.95);backdrop-filter:blur(6px);border-radius:11px;padding:9px 13px;
    box-shadow:var(--shadow);display:flex;gap:14px;font-size:.74rem;color:var(--muted)}
  .mapa-resumen b{color:var(--ink);font-size:.9rem;display:block}
  .px{padding:12px 14px}
  .resumen-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:9px 11px;flex:1;min-width:90px;box-shadow:var(--shadow)}
  .chip .num{font-size:1.28rem;font-weight:800;color:var(--agua);line-height:1.1}
  .chip .lbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;margin-top:2px;letter-spacing:.02em}
  .grid{display:grid;grid-template-columns:1fr;gap:11px;margin-bottom:13px}
  @media(min-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
  .tarjeta{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:12px 13px;box-shadow:var(--shadow)}
  .tarjeta h3{font-size:.83rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .chart-box{position:relative;height:175px}
  .seccion-titulo{font-size:.92rem;font-weight:700;margin:4px 0 9px;display:flex;align-items:center;justify-content:space-between}
  .badge{font-size:.66rem;background:var(--agua-l);color:var(--agua-d);padding:2px 8px;border-radius:20px;font-weight:700}
  .lista-com{display:flex;flex-direction:column;gap:6px}
  .com-item{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;display:flex;align-items:center;gap:10px}
  .com-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex:0 0 auto}
  .com-icon.disp{background:#e8f2dd;color:var(--verde)}
  .com-icon.aman{background:#fbe8d5;color:var(--tierra)}
  .com-info{flex:1;min-width:0}
  .com-nombre{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .com-meta{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .com-pob{text-align:right;flex:0 0 auto}
  .com-pob .v{font-weight:800;color:var(--agua);font-size:.88rem}
  .com-pob .l{font-size:.62rem;color:var(--muted)}
  .com-arrow{color:var(--line);font-size:1.1rem}
  .ver-mas{text-align:center;padding:10px;background:var(--card);border:1px dashed var(--line);
    border-radius:9px;color:var(--agua);font-weight:700;font-size:.8rem;margin-top:3px}
  .vacio{text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem}
  .cargando{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--agua);border-radius:50%;animation:girar .8s linear infinite;margin:0 auto 12px}
  @keyframes girar{to{transform:rotate(360deg)}}
  .barra-prog{height:5px;background:var(--line);border-radius:3px;overflow:hidden;max-width:220px;margin:9px auto}
  .barra-prog i{display:block;height:100%;background:var(--agua);width:0;transition:width .2s}
  .modal-fondo{position:fixed;inset:0;background:rgba(19,32,28,.55);z-index:900;display:none;flex-direction:column;justify-content:flex-end}
  .modal-fondo.activo{display:flex}
  .modal{background:var(--paper);border-radius:18px 18px 0 0;max-height:92vh;width:100%;
    display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(19,32,28,.3);animation:subir .25s ease-out}
  @keyframes subir{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:38px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 0;flex:0 0 auto}
  .modal-head{padding:10px 16px 12px;position:relative;flex:0 0 auto;border-bottom:1px solid var(--line)}
  .modal-head h2{font-size:1.08rem;font-weight:800;padding-right:30px;line-height:1.2}
  .modal-head .m-meta{font-size:.74rem;color:var(--muted);margin-top:2px}
  .modal-head .m-badges{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .m-badge{font-size:.64rem;font-weight:700;padding:3px 8px;border-radius:20px}
  .m-badge.tipo-d{background:#e8f2dd;color:var(--verde)}
  .m-badge.tipo-a{background:#fbe8d5;color:var(--tierra)}
  .m-badge.consol{background:#fdeed0;color:var(--sol)}
  .modal-close{position:absolute;top:10px;right:14px;width:28px;height:28px;border-radius:50%;
    background:var(--line);border:none;color:var(--ink);font-size:1.1rem;display:flex;align-items:center;justify-content:center}
  .modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px}
  .modal-sec{margin-bottom:17px}
  .modal-sec h4{font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em;
    color:var(--agua-d);margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--agua-l);
    display:flex;align-items:center;gap:6px}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
  @media(min-width:420px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 10px}
  .stat .sv{font-size:1.05rem;font-weight:800;color:var(--ink)}
  .stat .sl{font-size:.62rem;color:var(--muted);margin-top:1px;line-height:1.2}
  .stat .sp{font-size:.6rem;color:var(--verde);font-weight:700;margin-top:1px}
  .modal-chart{height:170px;position:relative;margin-top:8px}
  .modal-chart.peq{height:140px}
  .tabla-det{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:6px}
  .tabla-det tr{border-bottom:1px solid var(--line)}
  .tabla-det tr:last-child{border-bottom:none}
  .tabla-det td{padding:6px 4px}
  .tabla-det td:first-child{color:var(--muted)}
  .tabla-det td:last-child{text-align:right;font-weight:700;color:var(--ink)}
  .barra-mini{display:flex;align-items:center;gap:7px;padding:5px 0}
  .barra-mini .et{font-size:.72rem;color:var(--muted);width:108px;flex:0 0 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .barra-mini .pista{flex:1;height:7px;background:var(--line);border-radius:4px;overflow:hidden}
  .barra-mini .pista i{display:block;height:100%;border-radius:4px}
  .barra-mini .vv{font-size:.72rem;font-weight:700;width:38px;text-align:right;flex:0 0 auto}
  .modal-foot{padding:11px 16px calc(11px + var(--safe-b));border-top:1px solid var(--line);
    display:flex;gap:8px;background:var(--card);flex:0 0 auto}
  .btn-pdf,.btn-share{flex:1;padding:12px;border:none;border-radius:11px;font-size:.84rem;font-weight:800;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .btn-pdf{background:var(--tierra);color:#fff}
  .btn-share{background:var(--verde);color:#fff}
  .btn-pdf:disabled{opacity:.6}
  .leaflet-popup-content{font-size:.8rem;line-height:1.4;margin:9px 11px}
  .popup-nombre{font-weight:800;font-size:.86rem;margin-bottom:2px}
  .popup-meta{color:var(--muted);font-size:.72rem;margin-bottom:6px}
  .popup-btn{background:var(--agua);color:#fff;border:none;border-radius:7px;padding:6px 11px;
    font-size:.75rem;font-weight:700;width:100%;margin-top:2px}
  .marker-cluster-d{background-color:rgba(92,138,58,.5)}
  .marker-cluster-d div{background-color:rgba(92,138,58,.75);color:#fff}

  /* ───── VISTA PREVIA PDF ───── */
  .previa-fondo{position:fixed;inset:0;background:rgba(19,32,28,.7);z-index:950;display:none;
    align-items:flex-start;justify-content:center;padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .previa-fondo.activo{display:flex}
  .previa-card{background:#fff;border-radius:14px;max-width:720px;width:100%;margin:auto;
    box-shadow:0 12px 50px rgba(0,0,0,.35);overflow:hidden}
  .previa-head{background:var(--ink);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
  .previa-head h3{font-size:.92rem;font-weight:700}
  .previa-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:1.05rem}
  .previa-body-wrap{max-height:72vh;overflow-y:auto;background:#e9e7da;padding:14px}
  .previa-foot{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--line);background:var(--card)}
  .previa-foot button{flex:1;padding:12px;border:none;border-radius:11px;font-weight:800;font-size:.85rem}
  .btn-cancelar-pv{background:var(--line);color:var(--ink)}
  .btn-generar-pv{background:var(--tierra);color:#fff}

  /* Documento de la ficha (estilo papel A4) */
  .previa-doc{background:#fff;padding:22px 24px;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;
    box-shadow:0 1px 8px rgba(0,0,0,.15);max-width:640px;margin:0 auto}
  .pv-encabezado{display:flex;gap:12px;align-items:flex-start;border-bottom:3px solid var(--agua);padding-bottom:12px;margin-bottom:14px}
  .pv-logo{font-size:1.8rem;flex:0 0 auto}
  .pv-eyebrow{font-family:-apple-system,sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.06em;
    color:var(--agua-d);text-transform:uppercase}
  .pv-tituloBox h1{font-size:1.45rem;margin:3px 0 2px;line-height:1.15}
  .pv-ubicacion{font-family:-apple-system,sans-serif;font-size:.8rem;color:#555}
  .pv-meta-bar{display:flex;gap:18px;flex-wrap:wrap;font-family:-apple-system,sans-serif;font-size:.72rem;
    color:#555;margin-bottom:16px;background:#f6f4ee;padding:8px 12px;border-radius:7px}
  .pv-meta-bar span{display:block;text-transform:uppercase;font-size:.6rem;letter-spacing:.03em;color:#888}
  .pv-meta-bar b{font-family:Georgia,serif;font-size:.84rem;color:#1a1a1a}
  .pv-seccion{margin-bottom:14px}
  .pv-seccion h2{font-family:-apple-system,sans-serif;font-size:.84rem;font-weight:800;color:var(--agua-d);
    border-bottom:1.5px solid var(--agua-l);padding-bottom:4px;margin-bottom:6px}
  .pv-tabla{width:100%;border-collapse:collapse;font-size:.82rem}
  .pv-tabla th{font-family:-apple-system,sans-serif;font-size:.62rem;text-transform:uppercase;letter-spacing:.03em;
    color:#888;text-align:left;padding:4px 6px;border-bottom:1px solid #ccc}
  .pv-tabla th:last-child{text-align:right}
  .pv-tabla td{padding:5px 6px;border-bottom:1px solid #eee}
  .pv-tabla td:last-child{text-align:right;font-weight:700}
  .pv-tabla tr:nth-child(even) td{background:#faf9f5}
  .pv-pie{text-align:center;font-family:-apple-system,sans-serif;font-size:.65rem;color:#999;margin-top:18px;
    padding-top:10px;border-top:1px solid #ddd}

  /* ───── PROGRAMAS ───── */
  .prog-lista-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .prog-card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;
    display:flex;align-items:center;gap:11px}
  .prog-card-ic{width:38px;height:38px;border-radius:10px;background:var(--agua-l);color:var(--agua-d);
    display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex:0 0 auto}
  .prog-card-info{flex:1;min-width:0}
  .prog-card-nombre{font-weight:700;font-size:.88rem}
  .prog-card-meta{font-size:.72rem;color:var(--muted);margin-top:1px}
  .prog-card-del{background:none;border:none;color:var(--rojo);font-size:1.2rem;padding:4px 8px}
  .btn-nuevo-prog{width:100%;padding:13px;background:var(--agua);color:#fff;border:none;border-radius:11px;
    font-weight:800;font-size:.88rem;margin-bottom:16px}

  /* Editor de programa */
  .prog-editor-head{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .prog-back{background:var(--line);border:none;width:32px;height:32px;border-radius:9px;font-size:1.1rem;flex:0 0 auto}
  .prog-nombre-input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:9px;
    font-size:1rem;font-weight:700;background:#fff}

  .prog-buscador{position:relative;margin-bottom:10px}
  .prog-buscador input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:.85rem;background:#fff}
  .prog-resultados{background:#fff;border:1px solid var(--line);border-radius:10px;margin-top:5px;
    max-height:220px;overflow-y:auto;box-shadow:var(--shadow)}
  .prog-resultado-item{padding:9px 12px;border-bottom:1px solid var(--line);font-size:.82rem;cursor:pointer}
  .prog-resultado-item:last-child{border-bottom:none}
  .prog-resultado-item b{display:block;font-size:.85rem}
  .prog-resultado-item span{color:var(--muted);font-size:.72rem}

  .prog-mun-lista{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .prog-mun-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
  .prog-mun-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .prog-mun-card-nombre{flex:1;font-weight:700;font-size:.9rem}
  .prog-mun-quitar{background:none;border:none;color:var(--rojo);font-size:1.05rem}
  .prog-comentario{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    font-size:.82rem;font-family:inherit;resize:vertical;min-height:54px;margin-bottom:9px}
  .prog-fotos-grid{display:flex;gap:7px;flex-wrap:wrap}
  .prog-foto-thumb{width:62px;height:62px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
  .prog-foto-add{width:62px;height:62px;border-radius:8px;border:1.5px dashed var(--line);background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--muted);flex:0 0 auto}
  .prog-foto-wrap{position:relative}
  .prog-foto-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;
    background:var(--rojo);color:#fff;border:none;font-size:.7rem;display:flex;align-items:center;justify-content:center}

  .prog-vacio{text-align:center;padding:50px 20px;color:var(--muted)}
  .prog-vacio .ic{font-size:2.4rem;margin-bottom:8px}

  .btn-export-prog{width:100%;padding:12px;background:var(--tierra);color:#fff;border:none;border-radius:11px;
    font-weight:800;font-size:.85rem;margin-top:16px}

  /* ───── PROGRAMAS v2 ───── */
  .prog-step-bar{display:flex;align-items:center;gap:5px;margin-bottom:14px;font-size:.66rem;color:var(--muted)}
  .prog-step{padding:4px 9px;border-radius:20px;background:var(--line);font-weight:700}
  .prog-step.activo{background:var(--agua);color:#fff}
  .prog-step.hecho{background:var(--agua-l);color:var(--agua-d)}
  .prog-step-sep{color:var(--line)}

  .prog-filtros-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:13px}
  .prog-filtros-box h4{font-size:.78rem;font-weight:800;margin-bottom:10px;color:var(--agua-d);
    text-transform:uppercase;letter-spacing:.03em}
  .prog-filtro-fila{margin-bottom:11px}
  .prog-filtro-fila:last-child{margin-bottom:0}
  .prog-filtro-label{font-size:.76rem;font-weight:700;margin-bottom:5px;display:flex;justify-content:space-between}
  .prog-filtro-label .modo-sel{font-size:.64rem;font-weight:600;color:var(--agua);background:var(--agua-l);
    padding:2px 7px;border-radius:10px;cursor:pointer}
  .prog-rango-inputs{display:flex;align-items:center;gap:7px}
  .prog-rango-inputs input{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-size:.8rem;width:0}
  .prog-rango-inputs span{color:var(--muted);font-size:.74rem}
  .prog-check-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.8rem}
  .prog-check-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--agua)}
  .prog-aplicar-filtros{width:100%;padding:10px;background:var(--agua);color:#fff;border:none;border-radius:9px;
    font-weight:800;font-size:.82rem;margin-top:11px}

  .prog-resumen-sel{display:flex;gap:8px;margin-bottom:12px}
  .prog-resumen-sel .chip{flex:1}

  .prog-com-card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;
    display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
  .prog-com-card.seleccionada{border-color:var(--agua);background:#f1f9fa}

 Yura","TIOC-Raqaypampa","TIOC-Territorio Indígena Multiétnico","Tacachi","Tacopaya","Tahua","Tarata","Teoponte","Tinguipaya","Tipuani","Tiquipaya","Toco","Tolata","Toledo","Tomave","Totora","Trigal","Trinidad","Umala","Uriondo","Urmiri","Urubichá","Uyuni","Villa Ancoraimes","Villa Nueva","Villa Rivero","Villa Serrano","Villa Tunari","Villazón","Vinto","Vitichi","Yaco","Yamparáez","Yanacachi","Yapacaní","Yunchará","Yunguyo del Litoral"]},"TARIJA":{"ARCE":["Bermejo","Padcaya"],"AVILEZ":["Uriondo","Yunchará"],"CERCADO":["Tarija"],"GRAN CHACO":["Caraparí","Villa Montes","Yacuiba"],"MÉNDEZ":["El Puente","San Lorenzo"],"O'CONNOR":["Entre Ríos"]}};
const PASO = 40;
let charts = {};
let mapa, capaClusters;
let datosListos = false, mapaListo = false;

function cambiarVista(v){
  document.getElementById('tabMapa').classList.toggle('activo', v==='mapa');
  document.getElementById('tabLista').classList.toggle('activo', v==='lista');
  document.getElementById('tabProg').classList.toggle('activo', v==='programas');
  document.getElementById('vMapa').classList.toggle('activa', v==='mapa');
  document.getElementById('vLista').classList.toggle('activa', v==='lista');
  document.getElementById('vProgramas').classList.toggle('activa', v==='programas');
  if(v==='mapa' && mapa) setTimeout(function(){mapa.invalidateSize();},80);
  if(v==='programas') renderProgramas();
}

function initMapa(){
  mapa = L.map('mapaEl',{zoomControl:true,attributionControl:false}).setView([-16.5,-64.5],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mapa);
  capaClusters = L.markerClusterGroup({
    chunkedLoading:true, maxClusterRadius:50,
    iconCreateFunction:function(cluster){
      const n = cluster.getChildCount();
      let px = n<50?34:n<300?42:50;
      return L.divIcon({
        html:'<div style="width:'+px+'px;height:'+px+'px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-size:'+(px>40?'.85rem':'.72rem')+'">'+n+'</div>',
        className:'marker-cluster marker-cluster-d', iconSize:L.point(px,px)
      });
    }
  });
  mapa.addLayer(capaClusters);
  mapaListo = true;
  if(datosListos) pintarMapa();
}

function pintarMapa(){
  if(!mapaListo) return;
  capaClusters.clearLayers();
  const fuente = filtrados.length ? filtrados : DATOS;
  const marks = [];
  for(const r of fuente){
    if(!r.lat || !r.lon) continue;
    const color = r.tipo==='Dispersa' ? '#5c8a3a' : '#1f7a8c';
    const m = L.circleMarker([r.lat,r.lon],{radius:6,color:'#fff',weight:1.5,fillColor:color,fillOpacity:.9});
    const idx = DATOS.indexOf(r);
    m.bindPopup('<div class="popup-nombre">'+r.com+'</div><div class="popup-meta">'+r.mun+' · '+(r.pT||0).toLocaleString()+' hab.</div><button class="popup-btn" onclick="abrirModal('+idx+')">Ver ficha completa</button>');
    marks.push(m);
  }
  capaClusters.addLayers(marks);
  document.getElementById('mrTotal').textContent = fuente.length.toLocaleString();
  document.getElementById('mrPob').textContent = suma(fuente,'pT').toLocaleString();
  if(filtrados.length && filtrados.length < DATOS.length && marks.length){
    try{ mapa.fitBounds(L.featureGroup(marks).getBounds(),{padding:[30,30],maxZoom:13}); }catch(e){}
  } else if(!filtrados.length){
    mapa.setView([-16.5,-64.5],6);
  }
}

async function cargar(){
  initMapa();
  try{
    JER = JER_DATA;
    const datR = await fetch('datos_comunidades.json');
    const reader = datR.body.getReader();
    const total = +datR.headers.get('Content-Length') || 12000000;
    let recibido=0, chunks=[];
    while(true){
      const res = await reader.read();
      if(res.done) break;
      chunks.push(res.value); recibido+=res.value.length;
      const pct = Math.min(99, Math.round(recibido/total*100));
      const pe=document.getElementById('prog'), pt=document.getElementById('progTxt');
      if(pe){ pe.style.width=pct+'%'; pt.textContent=pct+'%'; }
    }
    const txt = await new Blob(chunks).text();
    DATOS = JSON.parse(txt);
    datosListos = true;
    poblarDepartamentos();
    filtrados = [];
    render();
    pintarMapa();
  }catch(e){
    document.getElementById('contenido').innerHTML =
      '<div class="vacio">No se pudieron cargar los datos.<br><small>'+e.message+'</small><br><br>'+
      'Verifica que <b>datos_comunidades.json</b> '+
      'y que lo abras con un servidor local.</div>';
  }
}

function poblarDepartamentos(){
  const s = document.getElementById('fDep');
  Object.keys(JER).sort().forEach(function(d){
    if(d==='Sin dato') return;
    s.innerHTML += '<option value="'+d+'">'+d+'</option>';
  });
}
document.getElementById('fDep').addEventListener('change',function(e){
  const dep=e.target.value, sP=document.getElementById('fProv'), sM=document.getElementById('fMun');
  sP.innerHTML='<option value="">Todas</option>'; sM.innerHTML='<option value="">Todos</option>';
  if(dep && JER[dep]) Object.keys(JER[dep]).sort().forEach(function(p){ sP.innerHTML+='<option value="'+p+'">'+p+'</option>'; });
  aplicarFiltros();
});
document.getElementById('fProv').addEventListener('change',function(e){
  const dep=document.getElementById('fDep').value, prov=e.target.value, sM=document.getElementById('fMun');
  sM.innerHTML='<option value="">Todos</option>';
  if(dep && prov && JER[dep] && JER[dep][prov]) JER[dep][prov].forEach(function(m){ sM.innerHTML+='<option value="'+m+'">'+m+'</option>'; });
  aplicarFiltros();
});
document.getElementById('fMun').addEventListener('change',aplicarFiltros);
let buscarTimer;
document.getElementById('fBuscar').addEventListener('input',function(){
  clearTimeout(buscarTimer); buscarTimer=setTimeout(aplicarFiltros,250);
});
function limpiar(){
  document.getElementById('fDep').value='';
  document.getElementById('fProv').innerHTML='<option value="">Todas</option>';
  document.getElementById('fMun').innerHTML='<option value="">Todos</option>';
  document.getElementById('fBuscar').value='';
  aplicarFiltros();
}

function aplicarFiltros(){
  if(!datosListos) return;
  const dep=document.getElementById('fDep').value, prov=document.getElementById('fProv').value;
  const mun=document.getElementById('fMun').value, q=document.getElementById('fBuscar').value.trim().toLowerCase();
  const hayFiltro = dep||prov||mun||q;
  filtrados = hayFiltro ? DATOS.filter(function(r){
    if(dep && r.dep!==dep) return false;
    if(prov && r.prov!==prov) return false;
    if(mun && r.mun!==mun) return false;
    if(q && !r.com.toLowerCase().includes(q)) return false;
    return true;
  }) : [];
  mostrados = PASO;
  render();
  pintarMapa();
}

function suma(arr,campo){ let s=0; for(const r of arr){ if(typeof r[campo]==='number') s+=r[campo]; } return s; }

function render(){
  if(!datosListos) return;
  const cont = document.getElementById('contenido');
  const base = filtrados.length ? filtrados : DATOS;
  if(base.length===0){ cont.innerHTML = '<div class="vacio">No hay comunidades con esos filtros.</div>'; return; }
  const nPob=suma(base,'pT'), nViv=suma(base,'vT');
  const nDisp=base.filter(function(r){return r.tipo==='Dispersa'}).length;
  const nAman=base.filter(function(r){return r.tipo==='Amanzanada'}).length;

  cont.innerHTML =
  '<div class="px">'+
  '<div class="resumen-bar">'+
    '<div class="chip"><div class="num">'+base.length.toLocaleString()+'</div><div class="lbl">Comunidades</div></div>'+
    '<div class="chip"><div class="num">'+nPob.toLocaleString()+'</div><div class="lbl">Población</div></div>'+
    '<div class="chip"><div class="num">'+nViv.toLocaleString()+'</div><div class="lbl">Viviendas</div></div>'+
    '<div class="chip"><div class="num">'+nDisp+'/'+nAman+'</div><div class="lbl">Disp/Aman</div></div>'+
  '</div>'+
  '<div class="grid">'+
    '<div class="tarjeta"><h3>💧 Fuente de agua</h3><div class="chart-box"><canvas id="chAgua"></canvas></div></div>'+
    '<div class="tarjeta"><h3>🚽 Saneamiento</h3><div class="chart-box"><canvas id="chSanea"></canvas></div></div>'+
    '<div class="tarjeta"><h3>⚡ Electricidad</h3><div class="chart-box"><canvas id="chElec"></canvas></div></div>'+
    '<div class="tarjeta"><h3>👥 Población por edad</h3><div class="chart-box"><canvas id="chEdad"></canvas></div></div>'+
    '<div class="tarjeta"><h3>🎓 Educación</h3><div class="chart-box"><canvas id="chEduc"></canvas></div></div>'+
    '<div class="tarjeta"><h3>🍳 Cocina</h3><div class="chart-box"><canvas id="chCocina"></canvas></div></div>'+
  '</div>'+
  '<button class="btn-export-prog" style="margin-bottom:14px" onclick="exportarEstadisticasFiltroPrincipal(this)">📊 Generar reporte estadístico de esta selección</button>'+
  '<div class="seccion-titulo"><span>Comunidades</span><span class="badge">'+base.length.toLocaleString()+'</span></div>'+
  '<div class="lista-com" id="listaCom"></div>'+
  '</div>';
  dibujarGraficos(base);
  renderListaCom(base);
}

function renderListaCom(base){
  const cont = document.getElementById('listaCom');
  const slice = base.slice(0,mostrados);
  let html = slice.map(function(r){
    const cls=r.tipo==='Dispersa'?'disp':'aman', ic=r.tipo==='Dispersa'?'🌿':'🏘️';
    const pob=typeof r.pT==='number'?r.pT.toLocaleString():'—';
    return '<div class="com-item" onclick="abrirModal('+DATOS.indexOf(r)+')">'+
      '<div class="com-icon '+cls+'">'+ic+'</div>'+
      '<div class="com-info"><div class="com-nombre">'+r.com+'</div><div class="com-meta">'+r.mun+' · '+r.prov+'</div></div>'+
      '<div class="com-pob"><div class="v">'+pob+'</div><div class="l">hab.</div></div>'+
      '<div class="com-arrow">›</div></div>';
  }).join('');
  if(mostrados<base.length) html += '<div class="ver-mas" onclick="verMas()">Ver más ('+(base.length-mostrados).toLocaleString()+')</div>';
  cont.innerHTML = html;
}
function verMas(){ mostrados+=PASO; renderListaCom(filtrados.length?filtrados:DATOS); }

const PAL=['#1f7a8c','#5c8a3a','#b56b45','#dba017','#cfeaf0','#8b5a8c','#c44536','#707a73'];
function destruirCharts(){ Object.values(charts).forEach(function(c){ if(c&&c.destroy) c.destroy(); }); charts={}; }
function torta(id,labels,data,colores){
  const el=document.getElementById(id); if(!el) return;
  charts[id]=new Chart(el,{type:'doughnut',data:{labels:labels,datasets:[{data:data,backgroundColor:colores||PAL,borderWidth:2,borderColor:'#fffdfa'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'bottom',labels:{boxWidth:9,font:{size:9.5},padding:6}}}}});
}
function barrasV(id,labels,data,color){
  const el=document.getElementById(id); if(!el) return;
  charts[id]=new Chart(el,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:color||'#1f7a8c',borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{font:{size:9.5}}},x:{ticks:{font:{size:9.5}}}}}});
}
function dibujarGraficos(f){
  destruirCharts();
  const agua=[['Cañería','aCan'],['Pileta','aPil'],['Pozo','aPozo'],['Río','aRio'],['Manantial','aMan'],['Lluvia','aLlu']].map(function(x){return [x[0],suma(f,x[1])]}).filter(function(x){return x[1]>0});
  if(agua.length) torta('chAgua',agua.map(function(x){return x[0]}),agua.map(function(x){return x[1]}));
  const san=[['Alcantar.','snAlc'],['Cám. séptica','snCam'],['Pozo ciego','snPozo'],['No tiene','snNo']].map(function(x){return [x[0],suma(f,x[1])]}).filter(function(x){return x[1]>0});
  if(san.length) torta('chSanea',san.map(function(x){return x[0]}),san.map(function(x){return x[1]}),['#5c8a3a','#cfeaf0','#dba017','#c44536']);
  const elec=[['Serv. público','elPub'],['No tiene','elNo']].map(function(x){return [x[0],suma(f,x[1])]}).filter(function(x){return x[1]>0});
  if(elec.length) torta('chElec',elec.map(function(x){return x[0]}),elec.map(function(x){return x[1]}),['#dba017','#c44536']);
  const edad=[['0-19','p019'],['20-39','p2039'],['40-59','p4059'],['60+','p60']].map(function(x){return [x[0],suma(f,x[1])]});
  barrasV('chEdad',edad.map(function(x){return x[0]}),edad.map(function(x){return x[1]}),'#1f7a8c');
  const edu=[['Ninguno','eNin'],['Primaria','ePri'],['Secund.','eSec'],['Superior','eSup']].map(function(x){return [x[0],suma(f,x[1])]});
  barrasV('chEduc',edu.map(function(x){return x[0]}),edu.map(function(x){return x[1]}),'#5c8a3a');
  const coc=[['Gas','cGas'],['Leña','cLena']].map(function(x){return [x[0],suma(f,x[1])]}).filter(function(x){return x[1]>0});
  if(coc.length) torta('chCocina',coc.map(function(x){return x[0]}),coc.map(function(x){return x[1]}),['#1f7a8c','#b56b45']);
}

function barraMini(label,val,max,color){
  const pct = max>0 ? Math.round((val||0)/max*100) : 0;
  return '<div class="barra-mini"><div class="et">'+label+'</div>'+
    '<div class="pista"><i style="width:'+pct+'%;background:'+color+'"></i></div>'+
    '<div class="vv">'+(val||0).toLocaleString()+'</div></div>';
}

function abrirPanelNota(){
  if(!comActual || !progActualId) return;
  const id = progActualId;
  const k = comKey(comActual);
  const p = programas[id];
  if(!p.notas[k]) p.notas[k] = {comentario:'', fotos:[]};
  const nota = p.notas[k];

  document.getElementById('notaMeta').textContent = comActual.com+' · '+comActual.mun+' — '+(p.nombre||'Programa');

  const fotosHtml = (nota.fotos||[]).map(function(foto,fi){
    return '<div class="prog-foto-wrap"><img class="prog-foto-thumb" src="'+foto+'">'+
      '<button class="prog-foto-del" onclick="quitarFotoNotaActual('+fi+')">×</button></div>';
  }).join('');

  document.getElementById('notaBody').innerHTML =
    '<div class="modal-sec">'+
      '<h4>💬 Comentario</h4>'+
      '<textarea class="prog-comentario" id="notaComentarioInput" placeholder="Escribe observaciones sobre '+comActual.com+'…" '+
        'oninput="guardarComentarioNotaActual(this.value)">'+(nota.comentario||'')+'</textarea>'+
    '</div>'+
    '<div class="modal-sec">'+
      '<h4>📷 Fotografías</h4>'+
      '<div class="prog-fotos-grid">'+fotosHtml+
        '<label class="prog-foto-add">＋<input type="file" accept="image/*" capture="environment" '+
        'style="display:none" onchange="agregarFotoNotaActual(this)"></label>'+
      '</div>'+
    '</div>';

  document.getElementById('notaFondo').classList.add('activo');
}
function cerrarPanelNota(){
  document.getElementById('notaFondo').classList.remove('activo');
}
function guardarComentarioNotaActual(val){
  if(!comActual || !progActualId) return;
  guardarComentarioComunidad(progActualId, comKey(comActual), val);
}
function agregarFotoNotaActual(input){
  if(!comActual || !progActualId) return;
  const id = progActualId, k = comKey(comActual);
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW=700, scale=Math.min(1,maxW/img.width);
      const canvas=document.createElement('canvas');
      canvas.width=img.width*scale; canvas.height=img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg',0.7);
      if(!programas[id].notas[k]) programas[id].notas[k] = {comentario:'',fotos:[]};
      programas[id].notas[k].fotos.push(dataUrl);
      guardarProgramas();
      abrirPanelNota(); // re-renderiza el panel con la foto nueva
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function quitarFotoNotaActual(fi){
  if(!comActual || !progActualId) return;
  programas[progActualId].notas[comKey(comActual)].fotos.splice(fi,1);
  guardarProgramas();
  abrirPanelNota();
}

document.getElementById('notaFondo').addEventListener('click',function(e){ if(e.target.id==='notaFondo') cerrarPanelNota(); });

async function generarPDFReal(){
  if(!comActual) return;
  const btn = document.getElementById('btnGenerarReal');
  btn.disabled = true; btn.textContent = '⏳ Generando…';
  try{
    const r = comActual;
    const jsPDF = window.jspdf.jsPDF;
    const pdf = new jsPDF('p','mm','a4');
    const pageW = 210, marginL = 16, marginR = 16, contW = pageW - marginL - marginR;
    let y = 18;

    const colInk = [19,32,28], colMuted=[112,122,115], colAgua=[31,122,140], colAguaD=[21,94,109], colLine=[227,225,212];

    function checkSalto(extra){
      if(y + extra > 280){ pdf.addPage(); y = 18; dibujarPie(); }
    }
    function dibujarPie(){
      pdf.setFontSize(7.5); pdf.setTextColor.apply(pdf,colMuted);
      pdf.text('Fuente: Censo INE Bolivia',marginL,291);
      pdf.text('Pág. '+pdf.internal.getNumberOfPages(),pageW-marginR,291,{align:'right'});
    }

    // Encabezado
    pdf.setFillColor.apply(pdf,colAgua);
    pdf.rect(0,0,pageW,32,'F');
    pdf.setTextColor(255,255,255);
    pdf.setFontSize(8.5); pdf.setFont(undefined,'bold');
    pdf.text('FICHA TÉCNICA · CENSO DE COMUNIDADES',marginL,10);
    pdf.setFontSize(18); pdf.setFont(undefined,'bold');
    pdf.text(r.com,marginL,20);
    pdf.setFontSize(10); pdf.setFont(undefined,'normal');
    pdf.text(r.mun+', '+r.prov+' · '+r.dep,marginL,27);
    y = 40;

    // Barra meta
    pdf.setTextColor.apply(pdf,colInk);
    pdf.setFontSize(8.5);
    const fecha = new Date().toLocaleDateString('es-BO',{year:'numeric',month:'long',day:'numeric'});
    pdf.setFont(undefined,'bold');
    pdf.text('Tipo: '+r.tipo,marginL,y);
    pdf.text('Coordenadas: '+(r.lat?r.lat.toFixed(5)+', '+r.lon.toFixed(5):'Sin dato'),marginL+65,y);
    pdf.text('Emitido: '+fecha,marginL+135,y);
    pdf.setFont(undefined,'normal');
    y += 7;
    pdf.setDrawColor.apply(pdf,colLine);
    pdf.line(marginL,y,pageW-marginR,y);
    y += 8;

    // Mapa de ubicación de la comunidad dentro de Bolivia
    if(r.lat && r.lon){
      try{
        const mapaImg = await generarImagenMapaComunidad(r);
        if(mapaImg){
          const mapW = 62, mapH = 70;
          checkSalto(mapH+6);
          pdf.setFontSize(8); pdf.setFont(undefined,'bold'); pdf.setTextColor.apply(pdf,colAguaD);
          pdf.text('UBICACIÓN EN BOLIVIA',marginL,y);
          pdf.addImage(mapaImg,'PNG',marginL,y+3,mapW,mapH);
          pdf.setDrawColor.apply(pdf,colLine);
          pdf.rect(marginL,y+3,mapW,mapH);
          pdf.setFont(undefined,'normal'); pdf.setFontSize(7); pdf.setTextColor.apply(pdf,colMuted);
          pdf.text('Lat '+r.lat.toFixed(4)+'°, Lon '+r.lon.toFixed(4)+'°', marginL, y+3+mapH+4);
          y += mapH + 10;
        }
      }catch(e){ /* si falla el mapa, continuar sin el */ }
    }

    function tituloSeccion(num,texto){
      checkSalto(14);
      pdf.setFontSize(11.5); pdf.setFont(undefined,'bold');
      pdf.setTextColor.apply(pdf,colAguaD);
      pdf.text(num+'. '+texto,marginL,y);
      y += 2;
      pdf.setDrawColor.apply(pdf,colAgua);
      pdf.setLineWidth(0.6);
      pdf.line(marginL,y,marginL+contW,y);
      pdf.setLineWidth(0.2);
      y += 6;
      pdf.setFont(undefined,'normal');
      pdf.setTextColor.apply(pdf,colInk);
    }

    function tabla(filas, colLabel, colVal){
      const rowH = 6.5;
      checkSalto(rowH*filas.length + 4);
      // encabezado tabla
      pdf.setFillColor(243,242,234);
      pdf.rect(marginL,y-4.5,contW,rowH,'F');
      pdf.setFontSize(8); pdf.setFont(undefined,'bold');
      pdf.setTextColor.apply(pdf,colMuted);
      pdf.text(colLabel,marginL+2,y);
      pdf.text(colVal,marginL+contW-2,y,{align:'right'});
      y += rowH;
      pdf.setFont(undefined,'normal');
      filas.forEach(function(f,i){
        checkSalto(rowH);
        if(i%2===1){ pdf.setFillColor(250,249,245); pdf.rect(marginL,y-4.5,contW,rowH,'F'); }
        pdf.setFontSize(8.5);
        pdf.setTextColor.apply(pdf,colInk);
        pdf.text(String(f[0]),marginL+2,y);
        pdf.setFont(undefined,'bold');
        const val = typeof f[1]==='number' ? f[1].toLocaleString('es-BO') : (f[1]||'Sin dato');
        pdf.text(String(val),marginL+contW-2,y,{align:'right'});
        pdf.setFont(undefined,'normal');
        y += rowH;
      });
      y += 5;
    }

    const pT=r.pT||0, pH=r.pH||0, pM=r.pM||0;
    const pctH=pT?Math.round(pH/pT*100):0, pctM=pT?Math.round(pM/pT*100):0;

    tituloSeccion('1','Población');
    tabla([
      ['Población total',pT],['Hombres',pH+' ('+pctH+'%)'],['Mujeres',pM+' ('+pctM+'%)'],
      ['0 a 19 años',r.p019||0],['20 a 39 años',r.p2039||0],['40 a 59 años',r.p4059||0],['60 años o más',r.p60||0]
    ],'INDICADOR','VALOR');

    tituloSeccion('2','Vivienda');
    tabla([['Total de viviendas',r.vT||0],['Viviendas ocupadas',r.vOcup||0],['Viviendas propias',r.vProp||0]],'INDICADOR','VALOR');

    tituloSeccion('3','Fuente de agua');
    tabla([
      ['Cañería de red',r.aCan||0],['Pileta pública',r.aPil||0],['Pozo con bomba',r.aPozo||0],
      ['Río, acequia o vertiente',r.aRio||0],['Manantial',r.aMan||0],['Agua de lluvia',r.aLlu||0]
    ],'FUENTE','VIVIENDAS');

    tituloSeccion('4','Saneamiento');
    tabla([['Alcantarillado',r.snAlc||0],['Cámara séptica',r.snCam||0],['Pozo ciego',r.snPozo||0],['No tiene',r.snNo||0]],'TIPO','VIVIENDAS');

    tituloSeccion('5','Energía eléctrica');
    tabla([['Servicio público',r.elPub||0],['Sin electricidad',r.elNo||0]],'TIPO','VIVIENDAS');

    tituloSeccion('6','Educación');
    tabla([['Sin instrucción',r.eNin||0],['Primaria',r.ePri||0],['Secundaria',r.eSec||0],['Superior',r.eSup||0]],'NIVEL','PERSONAS');

    tituloSeccion('7','Salud');
    tabla([['Atención SUS',r.sSUS||0],['Caja de salud',r.sCaja||0],['Seguro privado',r.sPriv||0],['Sin seguro',r.sNin||0]],'COBERTURA','PERSONAS');

    tituloSeccion('8','Actividad económica');
    tabla([['Agricultura y ganadería',r.ecAgri||0],['Comercio',r.ecCom||0]],'ACTIVIDAD','PERSONAS');

    tituloSeccion('9','Cocina y manejo de residuos');
    tabla([
      ['Cocina con gas en garrafa',r.cGas||0],['Cocina con leña',r.cLena||0],
      ['Basura: contenedor público',r.bCont||0],['Basura: la queman',r.bQuem||0]
    ],'INDICADOR','VIVIENDAS');

    tituloSeccion('10','Tecnología y comunicación');
    tabla([['Teléfono celular',r.tCel||0],['Internet',r.tInt||0],['Televisión',r.tTV||0]],'INDICADOR','PERSONAS');

    dibujarPie();
    pdf.save(r.com.replace(/[^a-zA-Z0-9]/g,'_')+'_'+r.mun.replace(/[^a-zA-Z0-9]/g,'_')+'_FICHA.pdf');
    cerrarPrevia();
  }catch(e){ alert('Error generando PDF: '+e.message); }
  btn.disabled=false; btn.textContent='⬇️ Descargar PDF';
}


// ════════════════ PROGRAMAS v2 (proyectos guardados localmente) ════════════════
const PROG_KEY = 'censoBO_programas_v2';
let programas = {};
let progActualId = null;

function progNuevo(){
  return {
    nombre: '', creado: Date.now(),
    etapa: 'municipios',          // municipios -> seleccion
    municipios: [],                // [{mun,dep,prov}]
    comKeys: [],                   // keys de comunidades que pasaron el filtro (candidatas)
    seleccion: {},                 // { comKey: true } - cuáles están elegidas
    notas: {},                     // { comKey: {comentario, fotos:[]} }
    filtros: { popMin:'', popMax:'', aguaOn:false, aguaMin:'', saneOn:false, saneMin:'' }
  };
}
function comKey(r){ return r.mun+'||'+r.com; }

function cargarProgramas(){
  try{ const raw = localStorage.getItem(PROG_KEY); programas = raw ? JSON.parse(raw) : {}; }
  catch(e){ programas = {}; }
}
function guardarProgramas(){
  try{ localStorage.setItem(PROG_KEY, JSON.stringify(programas)); }
  catch(e){ alert('No se pudo guardar: almacenamiento lleno. Elimina fotos o programas viejos.'); }
}

function renderProgramas(){
  cargarProgramas();
  if(progActualId && programas[progActualId]){
    const p = programas[progActualId];
    if(p.etapa==='municipios') renderEtapaMunicipios(progActualId);
    else renderEtapaSeleccion(progActualId);
  } else {
    renderListaProgramas();
  }
}

// ───────── LISTA DE PROGRAMAS ─────────
function renderListaProgramas(){
  const ids = Object.keys(programas).sort(function(a,b){ return (programas[b].creado||0)-(programas[a].creado||0); });
  let html = '<div class="seccion-titulo"><span>Mis programas</span></div>'+
    '<button class="btn-nuevo-prog" onclick="crearPrograma()">＋ Nuevo programa</button>';
  if(ids.length===0){
    html += '<div class="prog-vacio"><div class="ic">📊</div>Aún no tienes programas guardados.<br>Crea uno para empezar.</div>';
  } else {
    html += '<div class="prog-lista-grid">';
    ids.forEach(function(id){
      const p = programas[id];
      const nMun = (p.municipios||[]).length;
      const nSel = Object.keys(p.seleccion||{}).filter(function(k){return p.seleccion[k];}).length;
      const fecha = p.creado ? new Date(p.creado).toLocaleDateString('es-BO',{day:'2-digit',month:'short',year:'numeric'}) : '';
      const nombre = p.nombre || '(Sin nombre)';
      html += '<div class="prog-card" onclick="abrirPrograma(\''+id+'\')">'+
        '<div class="prog-card-ic">📊</div>'+
        '<div class="prog-card-info"><div class="prog-card-nombre">'+nombre+'</div>'+
        '<div class="prog-card-meta">'+nMun+' municipio'+(nMun===1?'':'s')+' · '+nSel+' comunidad'+(nSel===1?'':'es')+' · '+fecha+'</div></div>'+
        '<button class="prog-card-del" onclick="event.stopPropagation();borrarPrograma(\''+id+'\')">🗑️</button>'+
        '</div>';
    });
    html += '</div>';
  }
  document.getElementById('progRaiz').innerHTML = html;
}

function crearPrograma(){
  const n = Object.keys(programas).length + 1;
  const id = 'p_' + Date.now();
  const p = progNuevo();
  p.nombre = 'Programa '+n;
  programas[id] = p;
  guardarProgramas();
  progActualId = id;
  renderProgramas();
}
function abrirPrograma(id){ progActualId = id; renderProgramas(); }
function volverListaProgramas(){ progActualId = null; renderProgramas(); }
function borrarPrograma(id){
  if(!confirm('¿Eliminar "'+(programas[id].nombre||'este programa')+'"? Esta acción no se puede deshacer.')) return;
  delete programas[id]; guardarProgramas(); renderProgramas();
}
function renombrarPrograma(id, val){ programas[id].nombre = val; guardarProgramas(); }

function encabezadoEditor(id, pasoActivo){
  const p = programas[id];
  const pasos = ['Municipios','Filtrar y explorar comunidades'];
  let stepsHtml = pasos.map(function(txt,i){
    const cls = i===pasoActivo ? 'activo' : (i<pasoActivo ? 'hecho' : '');
    return '<span class="prog-step '+cls+'">'+(i+1)+'. '+txt+'</span>'+(i<1?'<span class="prog-step-sep">›</span>':'');
  }).join('');
  return '<div class="prog-editor-head">'+
    '<button class="prog-back" onclick="volverListaProgramas()">←</button>'+
    '<input class="prog-nombre-input" value="'+(p.nombre||'')+'" placeholder="Nombre del programa…" '+
    'onchange="renombrarPrograma(\''+id+'\',this.value)">'+
    '</div>'+
    '<div class="prog-step-bar">'+stepsHtml+'</div>';
}

// ───────── ETAPA 1: SELECCIÓN DE MUNICIPIOS ─────────
function renderEtapaMunicipios(id){
  const p = programas[id];
  let html = encabezadoEditor(id,0)+
    '<div class="prog-buscador">'+
      '<input type="text" id="progBuscarMun" placeholder="Buscar municipio para añadir…" oninput="buscarMunPrograma(this.value)">'+
      '<div class="prog-resultados" id="progResultados" style="display:none"></div>'+
    '</div>'+
    '<div class="prog-mun-lista-simple" id="progMunListaSimple"></div>';
  if(p.municipios.length>0){
    html += '<button class="prog-continuar-btn" onclick="irAEtapaSeleccion(\''+id+'\')">Continuar → Filtrar comunidades</button>';
  }
  document.getElementById('progRaiz').innerHTML = html;
  renderMunSimple(id);
}
function renderMunSimple(id){
  const p = programas[id];
  const cont = document.getElementById('progMunListaSimple');
  if(p.municipios.length===0){
    cont.innerHTML = '<div class="prog-vacio"><div class="ic">🔍</div>Busca y añade municipios arriba.</div>';
    return;
  }
  cont.innerHTML = '<div class="prog-mun-lista">' + p.municipios.map(function(m,i){
    return '<div class="prog-mun-card"><div class="prog-mun-card-top">'+
      '<div class="prog-mun-card-nombre">'+m.mun+', '+m.dep+'</div>'+
      '<button class="prog-mun-quitar" onclick="quitarMunDePrograma('+i+')">🗑️</button>'+
      '</div></div>';
  }).join('') + '</div>';
}
function buscarMunPrograma(q){
  const cont = document.getElementById('progResultados');
  q = q.trim().toLowerCase();
  if(q.length<2){ cont.style.display='none'; cont.innerHTML=''; return; }
  const vistos = {}; const resultados = [];
  for(const r of DATOS){
    if(r.mun.toLowerCase().includes(q) && !vistos[r.mun+'|'+r.dep]){
      vistos[r.mun+'|'+r.dep]=true;
      resultados.push({mun:r.mun,dep:r.dep,prov:r.prov});
      if(resultados.length>=12) break;
    }
  }
  cont.innerHTML = resultados.length===0
    ? '<div class="prog-resultado-item" style="color:var(--muted)">Sin resultados</div>'
    : resultados.map(function(r){
        return '<div class="prog-resultado-item" onclick="agregarMunAPrograma(\''+r.mun.replace(/'/g,"\\'")+'\',\''+r.dep.replace(/'/g,"\\'")+'\',\''+r.prov.replace(/'/g,"\\'")+'\')">'+
          '<b>'+r.mun+'</b><span>'+r.prov+', '+r.dep+'</span></div>';
      }).join('');
  cont.style.display='block';
}
function agregarMunAPrograma(mun,dep,prov){
  const p = programas[progActualId];
  if(p.municipios.some(function(m){return m.mun===mun && m.dep===dep;})){ alert(mun+' ya está en este programa.'); return; }
  p.municipios.push({mun:mun,dep:dep,prov:prov});
  guardarProgramas();
  document.getElementById('progBuscarMun').value='';
  document.getElementById('progResultados').style.display='none';
  renderEtapaMunicipios(progActualId);
}
function quitarMunDePrograma(idx){
  programas[progActualId].municipios.splice(idx,1);
  guardarProgramas();
  renderEtapaMunicipios(progActualId);
}

// ───────── ETAPA 2: FILTRAR Y SELECCIONAR COMUNIDADES ─────────
function irAEtapaSeleccion(id){
  programas[id].etapa = 'seleccion';
  guardarProgramas();
  renderProgramas();
}
function volverAEtapaMunicipios(id){
  programas[id].etapa = 'municipios';
  guardarProgramas();
  renderProgramas();
}

function comunidadesDelPrograma(p){
  const munSet = {};
  p.municipios.forEach(function(m){ munSet[m.mun+'|'+m.dep]=true; });
  return DATOS.filter(function(r){ return munSet[r.mun+'|'+r.dep]; });
}

function cumpleFiltros(r, f){
  const pT = typeof r.pT==='number' ? r.pT : 0;
  if(f.popMin!=='' && f.popMin!=null && !isNaN(+f.popMin) && pT < +f.popMin) return false;
  if(f.popMax!=='' && f.popMax!=null && !isNaN(+f.popMax) && pT > +f.popMax) return false;
  if(f.aguaOn && f.aguaMin!=='' && f.aguaMin!=null && !isNaN(+f.aguaMin)){
    const aguaTot=(r.aCan||0)+(r.aPil||0)+(r.aPozo||0)+(r.aRio||0)+(r.aMan||0)+(r.aLlu||0);
    const pctAgua = aguaTot>0 ? Math.round(((r.aCan||0)+(r.aPil||0))/aguaTot*100) : 0;
    if(pctAgua >= +f.aguaMin) return false; // queremos cobertura MENOR a este valor
  }
  if(f.saneOn && f.saneMin!=='' && f.saneMin!=null && !isNaN(+f.saneMin)){
    const sanTot=(r.snAlc||0)+(r.snCam||0)+(r.snPozo||0)+(r.snNo||0);
    const pctSinSane = sanTot>0 ? Math.round((r.snNo||0)/sanTot*100) : 0;
    if(pctSinSane < +f.saneMin) return false; // queremos % sin saneamiento MAYOR a este valor
  }
  return true;
}

let progMapa, progCapaClusters, progMapaListo=false, progMapaIdActual=null;

function initMapaPrograma(id){
  progMapaIdActual = id;
  if(progMapa){ progMapa.remove(); progMapa=null; }
  progMapa = L.map('progMapaEl',{zoomControl:true,attributionControl:false}).setView([-16.5,-64.5],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(progMapa);
  progCapaClusters = L.markerClusterGroup({
    chunkedLoading:true, maxClusterRadius:50,
    iconCreateFunction:function(cluster){
      const n = cluster.getChildCount();
      let px = n<50?34:n<300?42:50;
      return L.divIcon({
        html:'<div style="width:'+px+'px;height:'+px+'px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-size:'+(px>40?'.85rem':'.72rem')+'">'+n+'</div>',
        className:'marker-cluster marker-cluster-d', iconSize:L.point(px,px)
      });
    }
  });
  progMapa.addLayer(progCapaClusters);
  progMapaListo = true;
  pintarMapaPrograma(id);
}

function pintarMapaPrograma(id){
  if(!progMapaListo || !progMapa) return;
  const p = programas[id];
  const todas = comunidadesDelPrograma(p);
  const filtradas = todas.filter(function(r){ return cumpleFiltros(r,p.filtros); });

  progCapaClusters.clearLayers();
  const marks = [];
  filtradas.forEach(function(r){
    if(!r.lat || !r.lon) return;
    const k = comKey(r);
    const sel = !!p.seleccion[k];
    const color = sel ? '#5c8a3a' : (r.tipo==='Dispersa' ? '#b56b45' : '#1f7a8c');
    const m = L.circleMarker([r.lat,r.lon],{radius: sel?7:6, color:'#fff', weight:1.5, fillColor:color, fillOpacity:.92});
    const kEsc = k.replace(/'/g,"\\'");
    const idx = DATOS.indexOf(r);
    m.bindPopup(
      '<div class="popup-nombre">'+r.com+'</div>'+
      '<div class="popup-meta">'+r.mun+' · '+(r.pT||0).toLocaleString()+' hab.</div>'+
      '<button class="popup-btn-marcar '+(sel?'ya-marcada':'')+'" onclick="toggleDesdeMapa(\''+id+'\',\''+kEsc+'\')">'+
        (sel?'✓ En el programa (quitar)':'＋ Añadir al programa')+
      '</button>'+
      '<button class="popup-btn" style="margin-top:5px" onclick="abrirModalDesdePrograma('+idx+')">Ver ficha completa</button>'
    );
    marks.push(m);
  });
  progCapaClusters.addLayers(marks);

  document.getElementById('progMrTotal').textContent = filtradas.length.toLocaleString();
  const nSel = Object.keys(p.seleccion).filter(function(k){return p.seleccion[k];}).length;
  document.getElementById('progMrSel').textContent = nSel.toLocaleString();
  const chipT = document.getElementById('chipTotalFiltradas');
  if(chipT) chipT.querySelector('.num').textContent = filtradas.length.toLocaleString();
  const btnExport = document.getElementById('btnExportProgEtapa2');
  if(btnExport) btnExport.style.display = nSel>0 ? 'block' : 'none';
  const btnEstad = document.getElementById('btnExportEstadisticas');
  if(btnEstad) btnEstad.style.display = filtradas.length>0 ? 'block' : 'none';

  if(marks.length){
    try{ progMapa.fitBounds(L.featureGroup(marks).getBounds(),{padding:[28,28],maxZoom:13}); }catch(e){}
  } else {
    progMapa.setView([-16.5,-64.5],6);
  }
}

function toggleDesdeMapa(id,k){
  const p = programas[id];
  if(p.seleccion[k]) delete p.seleccion[k]; else p.seleccion[k]=true;
  guardarProgramas();
  progMapa.closePopup();
  pintarMapaPrograma(id);
  // refrescar chip y lista por si se cambia de subtab
  const n = Object.keys(p.seleccion).filter(function(kk){return p.seleccion[kk];}).length;
  const chipS = document.getElementById('chipSeleccionadas');
  if(chipS) chipS.querySelector('.num').textContent = n;
  renderListaComunidadesPrograma(id);
}

function renderListaComunidadesPrograma(id){
  const p = programas[id];
  const todas = comunidadesDelPrograma(p);
  const filtradas = todas.filter(function(r){ return cumpleFiltros(r,p.filtros); });
  const cont = document.getElementById('progListaCom');
  const chipT = document.getElementById('chipTotalFiltradas');
  if(chipT) chipT.querySelector('.num').textContent = filtradas.length.toLocaleString();

  const nSelTotal = Object.keys(p.seleccion).filter(function(k){return p.seleccion[k];}).length;
  const btnExport = document.getElementById('btnExportProgEtapa2');
  if(btnExport) btnExport.style.display = nSelTotal>0 ? 'block' : 'none';
  const btnEstad = document.getElementById('btnExportEstadisticas');
  if(btnEstad) btnEstad.style.display = filtradas.length>0 ? 'block' : 'none';

  // Gráficos agregados de SOLO las comunidades filtradas (reutiliza dibujarGraficos pero con ids propios)
  const wrap = document.getElementById('progGraficosWrap');
  if(wrap){
    wrap.innerHTML =
      '<div class="tarjeta"><h3>💧 Fuente de agua</h3><div class="chart-box"><canvas id="progChAgua"></canvas></div></div>'+
      '<div class="tarjeta"><h3>🚽 Saneamiento</h3><div class="chart-box"><canvas id="progChSanea"></canvas></div></div>';
    dibujarGraficosPrograma(filtradas);
  }

  if(!cont) return;
  if(filtradas.length===0){
    cont.innerHTML = '<div class="vacio">Ninguna comunidad cumple estos filtros.</div>';
    return;
  }
  cont.innerHTML = filtradas.map(function(r){
    const k = comKey(r);
    const sel = !!p.seleccion[k];
    const tieneNota = !!(p.notas[k] && (p.notas[k].comentario || (p.notas[k].fotos&&p.notas[k].fotos.length)));
    const idx = DATOS.indexOf(r);
    const aguaTot=(r.aCan||0)+(r.aPil||0)+(r.aPozo||0)+(r.aRio||0)+(r.aMan||0)+(r.aLlu||0);
    const pctAgua = aguaTot ? Math.round(((r.aCan||0)+(r.aPil||0))/aguaTot*100) : 0;
    const sanTot=(r.snAlc||0)+(r.snCam||0)+(r.snPozo||0)+(r.snNo||0);
    const pctSane = sanTot ? Math.round(((r.snAlc||0)+(r.snCam||0))/sanTot*100) : 0;
    return '<div class="prog-com-card '+(sel?'seleccionada':'')+'">'+
      '<input type="checkbox" class="prog-com-check" '+(sel?'checked':'')+' onchange="toggleSeleccionComunidad(\''+id+'\',\''+k.replace(/'/g,"\\'")+'\',this.checked)" onclick="event.stopPropagation()">'+
      '<div class="prog-com-info" onclick="abrirModalDesdePrograma('+idx+')">'+
        '<div class="prog-com-nombre">'+r.com+(tieneNota?' <span title="Tiene comentario o fotos">📝</span>':'')+'</div>'+
        '<div class="prog-com-meta">'+r.mun+' · '+r.tipo+'</div>'+
        '<div class="prog-com-indicadores">'+
          '<span>👥 <b>'+(r.pT||0).toLocaleString()+'</b> hab.</span>'+
          '<span>💧 <b>'+pctAgua+'%</b> agua</span>'+
          '<span>🚽 <b>'+pctSane+'%</b> saneam.</span>'+
        '</div>'+
      '</div></div>';
  }).join('');
}

function dibujarGraficosPrograma(filtradas){
  ['progChAgua','progChSanea'].forEach(function(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } });
  const agua=[['Cañería','aCan'],['Pileta','aPil'],['Pozo','aPozo'],['Río','aRio'],['Manantial','aMan'],['Lluvia','aLlu']]
    .map(function(x){return [x[0],suma(filtradas,x[1])]}).filter(function(x){return x[1]>0});
  if(agua.length) torta('progChAgua',agua.map(function(x){return x[0]}),agua.map(function(x){return x[1]}));
  const san=[['Alcantar.','snAlc'],['Cám. séptica','snCam'],['Pozo ciego','snPozo'],['No tiene','snNo']]
    .map(function(x){return [x[0],suma(filtradas,x[1])]}).filter(function(x){return x[1]>0});
  if(san.length) torta('progChSanea',san.map(function(x){return x[0]}),san.map(function(x){return x[1]}),['#5c8a3a','#cfeaf0','#dba017','#c44536']);
}

function aplicarFiltrosPrograma(id){
  const p = programas[id];
  p.filtros = {
    popMin: document.getElementById('fPopMin').value,
    popMax: document.getElementById('fPopMax').value,
    aguaOn: document.getElementById('fAguaOn').checked,
    aguaMin: document.getElementById('fAguaMin').value,
    saneOn: document.getElementById('fSaneOn').checked,
    saneMin: document.getElementById('fSaneMin').value,
  };
  guardarProgramas();
  renderListaComunidadesPrograma(id);
  pintarMapaPrograma(id);
}

function toggleSeleccionComunidad(id,k,val){
  const p = programas[id];
  if(val) p.seleccion[k] = true; else delete p.seleccion[k];
  guardarProgramas();
  const n = Object.keys(p.seleccion).filter(function(kk){return p.seleccion[kk];}).length;
  const chipS = document.getElementById('chipSeleccionadas');
  if(chipS) chipS.querySelector('.num').textContent = n;
  renderListaComunidadesPrograma(id);
  pintarMapaPrograma(id);
}

function seleccionarTodasFiltradas(id){
  const p = programas[id];
  const todas = comunidadesDelPrograma(p);
  const filtradas = todas.filter(function(r){ return cumpleFiltros(r,p.filtros); });
  filtradas.forEach(function(r){ p.seleccion[comKey(r)] = true; });
  guardarProgramas();
  renderListaComunidadesPrograma(id);
  pintarMapaPrograma(id);
  const n = Object.keys(p.seleccion).filter(function(k){return p.seleccion[k];}).length;
  const chipS = document.getElementById('chipSeleccionadas');
  if(chipS) chipS.querySelector('.num').textContent = n;
}
function deseleccionarTodas(id){
  programas[id].seleccion = {};
  guardarProgramas();
  renderListaComunidadesPrograma(id);
  pintarMapaPrograma(id);
  const chipS = document.getElementById('chipSeleccionadas');
  if(chipS) chipS.querySelector('.num').textContent = '0';
}

// ════════════════ EXPORTAR PDF DEL PROGRAMA ════════════════
async function exportarProgramaPDF(id){
  const p = programas[id];
  const seleccionadas = comunidadesDelPrograma(p).filter(function(r){ return p.seleccion[comKey(r)]; });
  if(!seleccionadas.length) return;
  const btn = document.querySelector('.btn-export-prog');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Generando…'; }
  try{
    const jsPDF = window.jspdf.jsPDF;
    const pdf = new jsPDF('p','mm','a4');
    const pageW=210, marginL=16, marginR=16, contW=pageW-marginL-marginR;
    let y=18;
    const colInk=[19,32,28], colMuted=[112,122,115], colAgua=[31,122,140], colAguaD=[21,94,109];
    function checkSalto(extra){ if(y+extra>280){ pdf.addPage(); y=18; } }

    pdf.setFillColor.apply(pdf,colAgua);
    pdf.rect(0,0,pageW,50,'F');
    pdf.setTextColor(255,255,255);
    pdf.setFontSize(9); pdf.setFont(undefined,'bold');
    pdf.text('REPORTE DE PROGRAMA · CENSO DE COMUNIDADES',marginL,14);
    pdf.setFontSize(20);
    pdf.text(p.nombre||'Programa sin nombre',marginL,27);
    pdf.setFontSize(9.5); pdf.setFont(undefined,'normal');
    const fecha = new Date(p.creado).toLocaleDateString('es-BO',{year:'numeric',month:'long',day:'numeric'});
    const nMunNombres = p.municipios.map(function(m){return m.mun;}).join(', ');
    pdf.text('Creado el '+fecha+' · '+seleccionadas.length+' comunidad(es) en '+p.municipios.length+' municipio(s)',marginL,36);
    const lineasMun = pdf.splitTextToSize('Municipios: '+nMunNombres, contW);
    pdf.text(lineasMun, marginL, 43);
    y = 55;

    for(let mi=0; mi<seleccionadas.length; mi++){
      const r = seleccionadas[mi];
      const k = comKey(r);
      const nota = p.notas[k] || {comentario:'',fotos:[]};
      checkSalto(20);
      pdf.setFontSize(12.5); pdf.setFont(undefined,'bold');
      pdf.setTextColor.apply(pdf,colAguaD);
      pdf.text((mi+1)+'. '+r.com,marginL,y);
      y+=5;
      pdf.setDrawColor.apply(pdf,colAgua); pdf.setLineWidth(0.5);
      pdf.line(marginL,y,marginL+contW,y); pdf.setLineWidth(0.2);
      y+=7;

      pdf.setFontSize(8); pdf.setFont(undefined,'normal'); pdf.setTextColor.apply(pdf,colMuted);
      pdf.text(r.mun+', '+r.prov+' · '+r.dep+' · '+r.tipo,marginL,y); y+=6;

      // Mini-mapa de ubicación junto a los indicadores (a la derecha)
      let yTextoInicio = y;
      const mapW2=28, mapH2=32;
      if(r.lat && r.lon){
        try{
          const mapaImg2 = await generarImagenMapaComunidad(r);
          if(mapaImg2){
            checkSalto(mapH2+2);
            pdf.addImage(mapaImg2,'PNG',marginL+contW-mapW2,y-3,mapW2,mapH2);
            pdf.setDrawColor.apply(pdf,colMuted);
            pdf.rect(marginL+contW-mapW2,y-3,mapW2,mapH2);
          }
        }catch(e){}
      }

      pdf.setFontSize(8.3); pdf.setTextColor.apply(pdf,colInk);
      const aguaTot=(r.aCan||0)+(r.aPil||0)+(r.aPozo||0)+(r.aRio||0)+(r.aMan||0)+(r.aLlu||0);
      const sanTot=(r.snAlc||0)+(r.snCam||0)+(r.snPozo||0)+(r.snNo||0);
      const anchoTexto = contW - mapW2 - 4;
      pdf.text('Población: '+(r.pT||0).toLocaleString()+'\nViviendas: '+(r.vT||0).toLocaleString()+
        '\nAgua (cañería+pileta): '+(aguaTot?Math.round(((r.aCan||0)+(r.aPil||0))/aguaTot*100):0)+'%'+
        '\nSin saneamiento: '+(sanTot?Math.round((r.snNo||0)/sanTot*100):0)+'%', marginL, y, {maxWidth:anchoTexto, lineHeightFactor:1.5});
      y = Math.max(y+18, yTextoInicio + mapH2);
      y += 4;

      if(nota.comentario && nota.comentario.trim()){
        pdf.setFont(undefined,'bold'); pdf.setFontSize(8.3);
        pdf.text('Comentarios:',marginL,y); y+=5;
        pdf.setFont(undefined,'normal');
        const lineas = pdf.splitTextToSize(nota.comentario, contW);
        checkSalto(lineas.length*4.2);
        pdf.text(lineas, marginL, y);
        y += lineas.length*4.2 + 4;
      }

      if(nota.fotos && nota.fotos.length){
        pdf.setFont(undefined,'bold'); pdf.setFontSize(8.3);
        pdf.text('Fotografías ('+nota.fotos.length+'):',marginL,y); y+=5;
        const fotoW=55, fotoH=42, gap=6; let x=marginL;
        for(let fi=0; fi<nota.fotos.length; fi++){
          checkSalto(fotoH+6);
          if(x+fotoW>marginL+contW){ x=marginL; y+=fotoH+gap; checkSalto(fotoH+6); }
          try{ pdf.addImage(nota.fotos[fi],'JPEG',x,y,fotoW,fotoH); }catch(e){}
          x+=fotoW+gap;
        }
        y+=fotoH+10;
      }
      y+=4;
    }

    pdf.setFontSize(7.5); pdf.setTextColor.apply(pdf,colMuted);
    const totalPag = pdf.internal.getNumberOfPages();
    for(let pg=1; pg<=totalPag; pg++){
      pdf.setPage(pg);
      pdf.text('Fuente: Censo INE Bolivia',marginL,291);
      pdf.text('Pág. '+pg+'/'+totalPag,pageW-marginR,291,{align:'right'});
    }
    pdf.save((p.nombre||'programa').replace(/[^a-zA-Z0-9]/g,'_')+'_REPORTE.pdf');
  }catch(e){ alert('Error generando el reporte: '+e.message); }
  if(btn){ btn.disabled=false; btn.textContent='📄 Exportar reporte del programa'; }
}

const BOL_LON_MIN=-70.1, BOL_LON_MAX=-57.0, BOL_LAT_MIN=-23.3, BOL_LAT_MAX=-9.3;

// Proyección con corrección por latitud (cos del centro de Bolivia ~-16.5°)
// para que el mapa no se vea estirado horizontalmente, y centrado dentro del
// rectángulo disponible manteniendo la proporción real del país.
const BOL_LAT_CENTRO = (BOL_LAT_MIN+BOL_LAT_MAX)/2;
const BOL_COS_LAT = Math.cos(BOL_LAT_CENTRO * Math.PI/180);
function proyectarPunto(lon, lat, w, h, pad){
  const anchoGeo = (BOL_LON_MAX-BOL_LON_MIN) * BOL_COS_LAT;
  const altoGeo = (BOL_LAT_MAX-BOL_LAT_MIN);
  const dispW = w-2*pad, dispH = h-2*pad;
  // Escala uniforme: usar la dimensión más restrictiva para no deformar
  const escala = Math.min(dispW/anchoGeo, dispH/altoGeo);
  const anchoFinal = anchoGeo*escala, altoFinal = altoGeo*escala;
  const offX = pad + (dispW-anchoFinal)/2;
  const offY = pad + (dispH-altoFinal)/2;
  const x = offX + (lon-BOL_LON_MIN)*BOL_COS_LAT*escala;
  const y = offY + (BOL_LAT_MAX-lat)*escala;
  return [x,y];
}

function generarSVGMapaBolivia(lon, lat, nombrePunto, opciones){
  opciones = opciones || {};
  const w = opciones.w || 300, h = opciones.h || 340, pad = 14;
  const puntosContorno = BOLIVIA_CONTORNO.map(function(c){
    const p = proyectarPunto(c[0], c[1], w, h, pad);
    return p[0].toFixed(1)+','+p[1].toFixed(1);
  }).join(' ');

  let pinSvg = '';
  if(lon && lat){
    const p = proyectarPunto(lon, lat, w, h, pad);
    pinSvg =
      '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="9" fill="#c44536" opacity="0.25"/>'+
      '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="4.5" fill="#c44536" stroke="#fff" stroke-width="1.5"/>';
  }

  // Marcas de las 4 ciudades principales como referencia visual (no dependen de DATOS)
  const refs = [
    {n:'La Paz', lon:-68.15, lat:-16.50},
    {n:'Santa Cruz', lon:-63.18, lat:-17.78},
    {n:'Cochabamba', lon:-66.16, lat:-17.39},
    {n:'Sucre', lon:-65.26, lat:-19.04},
  ];
  let refsSvg = refs.map(function(r){
    const p = proyectarPunto(r.lon, r.lat, w, h, pad);
    return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="1.6" fill="#9a9486"/>'+
      '<text x="'+(p[0]+3)+'" y="'+(p[1]+2.5)+'" font-size="6" fill="#8a8478" font-family="Arial">'+r.n+'</text>';
  }).join('');

  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+
    '<rect width="'+w+'" height="'+h+'" fill="#eef6f8"/>'+
    '<polygon points="'+puntosContorno+'" fill="#dceef0" stroke="#1f7a8c" stroke-width="1.6"/>'+
    refsSvg + pinSvg +
    '</svg>';
}

function svgToDataURL(svgString, w, h){
  // Convertir SVG a PNG dataURL via canvas, para insertarlo en jsPDF (que no soporta SVG directo)
  return new Promise(function(resolve){
    const img = new Image();
    const svgBlob = new Blob([svgString], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    img.onload = function(){
      const canvas = document.createElement('canvas');
      canvas.width = w*2; canvas.height = h*2; // escala 2x para nitidez
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = function(){ URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function generarImagenMapaComunidad(r){
  if(!r.lat || !r.lon) return null;
  const svg = generarSVGMapaBolivia(r.lon, r.lat, r.com, {w:300,h:340});
  return await svgToDataURL(svg, 300, 340);
}

function generarSVGMapaConjunto(comunidades, w, h){
  const pad = 14;
  const puntosContorno = BOLIVIA_CONTORNO.map(function(c){
    const p = proyectarPunto(c[0], c[1], w, h, pad);
    return p[0].toFixed(1)+','+p[1].toFixed(1);
  }).join(' ');
  const refs = [
    {n:'La Paz', lon:-68.15, lat:-16.50},{n:'Santa Cruz', lon:-63.18, lat:-17.78},
    {n:'Cochabamba', lon:-66.16, lat:-17.39},{n:'Sucre', lon:-65.26, lat:-19.04},
  ];
  let refsSvg = refs.map(function(r){
    const p = proyectarPunto(r.lon, r.lat, w, h, pad);
    return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="1.6" fill="#9a9486"/>'+
      '<text x="'+(p[0]+3)+'" y="'+(p[1]+2.5)+'" font-size="6" fill="#8a8478" font-family="Arial">'+r.n+'</text>';
  }).join('');
  let puntosSvg = '';
  comunidades.forEach(function(r){
    if(!r.lat || !r.lon) return;
    const p = proyectarPunto(r.lon, r.lat, w, h, pad);
    puntosSvg += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="#1f7a8c" opacity="0.85" stroke="#fff" stroke-width="0.8"/>';
  });
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+
    '<rect width="'+w+'" height="'+h+'" fill="#eef6f8"/>'+
    '<polygon points="'+puntosContorno+'" fill="#dceef0" stroke="#1f7a8c" stroke-width="1.6"/>'+
    refsSvg + puntosSvg +
    '</svg>';
}
async function generarImagenMapaConjunto(comunidades, w, h){
  const svg = generarSVGMapaConjunto(comunidades, w, h);
  return await svgToDataURL(svg, w, h);
}

    pdf.text('Criterios de filtrado utilizados:',marginL,y); y+=5.5;
    pdf.setFont(undefined,'normal'); pdf.setFontSize(8);
    const f = p.filtros;
    const criterios = [];
    if(f.popMin!=='') criterios.push('Población mínima: '+f.popMin);
    if(f.popMax!=='') criterios.push('Población máxima: '+f.popMax);
    if(f.aguaOn && f.aguaMin!=='') criterios.push('Cobertura de agua potable menor a '+f.aguaMin+'%');
    if(f.saneOn && f.saneMin!=='') criterios.push('Comunidades sin saneamiento básico mayor a '+f.saneMin+'%');
    if(criterios.length===0) criterios.push('Sin filtros adicionales (todas las comunidades de los municipios elegidos)');
    criterios.forEach(function(c){ pdf.text('•  '+c, marginL+2, y); y+=4.5; });
    y += 5;

    // ── Mapa general con todos los puntos filtrados ──
    try{
      const mapW=80, mapH=92;
      checkSalto(mapH+12);
      pdf.setFontSize(8.5); pdf.setFont(undefined,'bold'); pdf.setTextColor.apply(pdf,colAguaD);

      const nAman = filtradas.filter(function(r){return r.tipo==='Amanzanada';}).length;
      const kpis = [

      });

    pdf.setTextColor.apply(pdf,colInk);

    function tituloSeccion(num,texto){
      checkSalto(14);
      pdf.setFontSize(11.5); pdf.setFont(undefined,'bold');
      pdf.setTextColor.apply(pdf,colAguaD);
      pdf.text(num+'. '+texto,marginL,y);

      pdf.setDrawColor.apply(pdf,colAgua); pdf.setLineWidth(0.6);

      y += 6;
      pdf.setFont(undefined,'normal'); pdf.setTextColor.apply(pdf,colInk);
    }
    function tabla(filas, colLabel, colVal){
      const rowH=6.5;
      checkSalto(rowH*filas.length+4);
      pdf.setFillColor(243,242,234);
      pdf.rect(marginL,y-4.5,contW,rowH,'F');
      pdf.setFontSize(8); pdf.setFont(undefined,'bold'); pdf.setTextColor.apply(pdf,colMuted);
      pdf.text(colLabel,marginL+2,y); pdf.text(colVal,marginL+contW-2,y,{align:'right'});

        checkSalto(rowH);
        if(i%2===1){ pdf.setFillColor(250,249,245); pdf.rect(marginL,y-4.5,contW,rowH,'F'); }
        pdf.setFontSize(8.5); pdf.setTextColor.apply(pdf,colInk);
        pdf.text(String(fl[0]),marginL+2,y);
        pdf.setFont(undefined,'bold');
        const val = typeof fl[1]==='number' ? fl[1].toLocaleString('es-BO') : (fl[1]||'Sin dato');
        pdf.text(String(val),marginL+contW-2,y,{align:'right'});
        pdf.setFont(undefined,'normal');
        y+=rowH;
      });
      y+=5;
    }
    function sumaF(campo){ return filtradas.reduce(function(s,r){ return s+(typeof r[campo]==='number'?r[campo]:0); },0); }

    tabla([
      ['Población total',pT],['Hombres',pH+' ('+(pT?Math.round(pH/pT*100):0)+'%)'],
      ['Mujeres',pM+' ('+(pT?Math.round(pM/pT*100):0)+'%)'],
      ['0 a 19 años',sumaF('p019')],['20 a 39 años',sumaF('p2039')],
      ['40 a 59 años',sumaF('p4059')],['60 años o más',sumaF('p60')],
    ],'INDICADOR','TOTAL');

    tituloSeccion('2','Vivienda');
    tabla([['Total de viviendas',sumaF('vT')],['Viviendas ocupadas',sumaF('vOcup')],['Viviendas propias',sumaF('vProp')]],'INDICADOR','TOTAL');

    const aguaTot = sumaF('aCan')+sumaF('aPil')+sumaF('aPozo')+sumaF('aRio')+sumaF('aMan')+sumaF('aLlu');
    tituloSeccion('3','Fuente de agua potable');
    tabla([
      ['Cañería de red',sumaF('aCan')],['Pileta pública',sumaF('aPil')],['Pozo con bomba',sumaF('aPozo')],
      ['Río, acequia o vertiente',sumaF('aRio')],['Manantial',sumaF('aMan')],['Agua de lluvia',sumaF('aLlu')],
      ['% con cobertura adecuada (cañería+pileta)', aguaTot? Math.round((sumaF('aCan')+sumaF('aPil'))/aguaTot*100)+'%' : 'Sin dato'],
    ],'FUENTE','VIVIENDAS');

    const sanTot = sumaF('snAlc')+sumaF('snCam')+sumaF('snPozo')+sumaF('snNo');
    tituloSeccion('4','Saneamiento básico');
    tabla([
      ['Alcantarillado',sumaF('snAlc')],['Cámara séptica',sumaF('snCam')],['Pozo ciego',sumaF('snPozo')],
      ['No tiene',sumaF('snNo')],
      ['% sin saneamiento', sanTot? Math.round(sumaF('snNo')/sanTot*100)+'%' : 'Sin dato'],
    ],'TIPO','VIVIENDAS');

    tituloSeccion('5','Energía eléctrica');
    tabla([['Servicio público',sumaF('elPub')],['Sin electricidad',sumaF('elNo')]],'TIPO','VIVIENDAS');

    tituloSeccion('6','Educación');
    tabla([['Sin instrucción',sumaF('eNin')],['Primaria',sumaF('ePri')],['Secundaria',sumaF('eSec')],['Superior',sumaF('eSup')]],'NIVEL','PERSONAS');

    tituloSeccion('7','Salud');
    tabla([['Atención SUS',sumaF('sSUS')],['Caja de salud',sumaF('sCaja')],['Seguro privado',sumaF('sPriv')],['Sin seguro',sumaF('sNin')]],'COBERTURA','PERSONAS');

    tituloSeccion('8','Tecnología y comunicación');
    tabla([['Teléfono celular',sumaF('tCel')],['Internet',sumaF('tInt')],['Televisión',sumaF('tTV')]],'INDICADOR','PERSONAS');

    // ── Listado de comunidades incluidas ──
    tituloSeccion('9','Listado de comunidades incluidas en este reporte');
    const filasListado = filtradas.map(function(r){
      return [r.com+' ('+r.mun+')', (r.pT||0).toLocaleString()+' hab.'];
    });
    tabla(filasListado, 'COMUNIDAD', 'POBLACIÓN');

    dibujarPiePag();
    pdf.save((p.nombre||'programa').replace(/[^a-zA-Z0-9]/g,'_')+'_ESTADISTICAS.pdf');
  }catch(e){ alert('Error generando el reporte estadístico: '+e.message); }
  if(btn){ btn.disabled=false; btn.textContent='📊 Reporte estadístico del conjunto filtrado'; }
}

      pdf.text(colLabel,marginL+2,y); pdf.text(colVal,marginL+contW-2,y,{align:'right'});

      filas.forEach(function(fl,i){

        pdf.setFontSize(8.5); pdf.setTextColor.apply(pdf,colInk);
        pdf.text(String(fl[0]),marginL+2,y);
        pdf.setFont(undefined,'bold');
        const val = typeof fl[1]==='number' ? fl[1].toLocaleString('es-BO') : (fl[1]||'Sin dato');
        pdf.text(String(val),marginL+contW-2,y,{align:'right'});
        pdf.setFont(undefined,'normal');
        y+=rowH;
      });
      y+=5;
    }
    function sumaB(campo){ return base.reduce(function(s,r){ return s+(typeof r[campo]==='number'?r[campo]:0); },0); }

    const pT=sumaB('pT'), pH=sumaB('pH'), pM=sumaB('pM');
    tituloSeccion('1','Población (agregado del conjunto)');
    tabla([
      ['Población total',pT],['Hombres',pH+' ('+(pT?Math.round(pH/pT*100):0)+'%)'],
      ['Mujeres',pM+' ('+(pT?Math.round(pM/pT*100):0)+'%)'],
      ['0 a 19 años',sumaB('p019')],['20 a 39 años',sumaB('p2039')],
      ['40 a 59 años',sumaB('p4059')],['60 años o más',sumaB('p60')],
    ],'INDICADOR','TOTAL');

    tituloSeccion('2','Vivienda');
    tabla([['Total de viviendas',sumaB('vT')],['Viviendas ocupadas',sumaB('vOcup')],['Viviendas propias',sumaB('vProp')]],'INDICADOR','TOTAL');

    const aguaTot = sumaB('aCan')+sumaB('aPil')+sumaB('aPozo')+sumaB('aRio')+sumaB('aMan')+sumaB('aLlu');
    tituloSeccion('3','Fuente de agua potable');
    tabla([
      ['Cañería de red',sumaB('aCan')],['Pileta pública',sumaB('aPil')],['Pozo con bomba',sumaB('aPozo')],
      ['Río, acequia o vertiente',sumaB('aRio')],['Manantial',sumaB('aMan')],['Agua de lluvia',sumaB('aLlu')],
      ['% con cobertura adecuada (cañería+pileta)', aguaTot? Math.round((sumaB('aCan')+sumaB('aPil'))/aguaTot*100)+'%' : 'Sin dato'],
    ],'FUENTE','VIVIENDAS');

    const sanTot = sumaB('snAlc')+sumaB('snCam')+sumaB('snPozo')+sumaB('snNo');
    tituloSeccion('4','Saneamiento básico');
    tabla([
      ['Alcantarillado',sumaB('snAlc')],['Cámara séptica',sumaB('snCam')],['Pozo ciego',sumaB('snPozo')],
      ['No tiene',sumaB('snNo')],
      ['% sin saneamiento', sanTot? Math.round(sumaB('snNo')/sanTot*100)+'%' : 'Sin dato'],
    ],'TIPO','VIVIENDAS');

    tituloSeccion('5','Energía eléctrica');
    tabla([['Servicio público',sumaB('elPub')],['Sin electricidad',sumaB('elNo')]],'TIPO','VIVIENDAS');

    tituloSeccion('6','Educación');
    tabla([['Sin instrucción',sumaB('eNin')],['Primaria',sumaB('ePri')],['Secundaria',sumaB('eSec')],['Superior',sumaB('eSup')]],'NIVEL','PERSONAS');

    tituloSeccion('7','Salud');
    tabla([['Atención SUS',sumaB('sSUS')],['Caja de salud',sumaB('sCaja')],['Seguro privado',sumaB('sPriv')],['Sin seguro',sumaB('sNin')]],'COBERTURA','PERSONAS');

    tituloSeccion('8','Tecnología y comunicación');
    tabla([['Teléfono celular',sumaB('tCel')],['Internet',sumaB('tInt')],['Televisión',sumaB('tTV')]],'INDICADOR','PERSONAS');

    // Listado solo si no son demasiadas (limitar a 200 para no generar un PDF gigante)
    if(base.length <= 200){
      tituloSeccion('9','Listado de comunidades incluidas');
      const filasListado = base.map(function(r){ return [r.com+' ('+r.mun+')', (r.pT||0).toLocaleString()+' hab.']; });
      tabla(filasListado, 'COMUNIDAD', 'POBLACIÓN');
    } else {
      checkSalto(10);
      pdf.setFontSize(8); pdf.setFont(undefined,'italic'); pdf.setTextColor.apply(pdf,colMuted);
      pdf.text('('+base.length.toLocaleString()+' comunidades — listado omitido por ser muy extenso; use filtros más específicos para incluirlo)', marginL, y);
      pdf.setFont(undefined,'normal');
      y+=8;
    }

    dibujarPiePag();
    const nombreArchivo = (tituloReporte==='Bolivia (todas las comunidades)' ? 'Bolivia_Nacional' : tituloReporte).replace(/[^a-zA-Z0-9]/g,'_');
    pdf.save(nombreArchivo+'_ESTADISTICAS.pdf');
  }catch(e){ alert('Error generando el reporte: '+e.message); }
  if(btn){ btn.disabled=false; btn.textContent='📊 Generar reporte estadístico de esta selección'; }
}
