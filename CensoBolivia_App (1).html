/* ════════════════════ WRAPS ════════════════════ */
function wrapFunctions(){
  /* cambiarVista + inicio */
  var _cv=window.cambiarVista;
  window.cambiarVista=function(v){
    var vi=$id('vInicio'),ti=$id('tabInicio');
    if(v==='inicio'){
      ['vMapa','vLista','vProgramas'].forEach(function(id){var el=$id(id);if(el)el.classList.remove('activa');});
      ['tabMapa','tabLista','tabProg'].forEach(function(id){var el=$id(id);if(el)el.classList.remove('activo');});
      if(vi)vi.classList.add('activa');if(ti)ti.classList.add('activo');renderDashboard();
    }else{if(vi)vi.classList.remove('activa');if(ti)ti.classList.remove('activo');_cv(v);}
    if(v==='programas')setTimeout(addProgExtras,350);
  };
  /* abrirModal */
  var _am=window.abrirModal;
  window.abrirModal=function(idx){
    _am(idx);var r=DATOS[idx];if(!r)return;
    addHist(r);actualizarFavBtn();
    var ba=$id('btnAlertaM');if(ba){var al=lsGet('censo_al')||{};ba.textContent=al[cId(r)]?'🚩 Alertada':'🏳️ Alertar';}
    setTimeout(function(){iniciarMiniMapa(r);},200);
  };
  /* cerrarModal */
  var _cm=window.cerrarModal;
  window.cerrarModal=function(){
    _cm();var w=$id('miniMapW');if(w){w.style.display='none';w.innerHTML='';}if(miniMapObj){miniMapObj.remove();miniMapObj=null;}
  };
  /* NO wrappeamos pintarMapa (capaClusters es let) */
  /* click handler mapa con delay */
  setTimeout(function(){
    if(!window.mapa)return;
    mapa.on('click',function(e){
      var lat=e.latlng.lat,lon=e.latlng.lng;
      if(poiMode){poiMode=false;poiLat=lat;poiLon=lon;$id('poiLbl').textContent='Ubicación: '+lat.toFixed(5)+', '+lon.toFixed(5);$id('poiOv').classList.add('activo');return;}
      if(medirOn){if(!medirA){medirA=[lat,lon];showTool('Toca punto B');}else{var d=hv(medirA,[lat,lon]);if(medirLine)mapa.removeLayer(medirLine);medirLine=L.polyline([medirA,[lat,lon]],{color:'#c44536',weight:2,dashArray:'5,4'}).addTo(mapa);L.popup().setLatLng(e.latlng).setContent('<b>'+d.toFixed(2)+' km</b>').openOn(mapa);medirA=null;showTool('Toca otro punto A');}return;}
      if(radioWait){radioWait=false;cancelTool();var dentro=DATOS.filter(function(r){return r.lat&&r.lon&&hv([lat,lon],[r.lat,r.lon])<=radioKm;});L.circle([lat,lon],{radius:radioKm*1000,color:'#1f7a8c',weight:2,fillOpacity:.07}).addTo(mapa).bindPopup('<b>'+dentro.length+' comunidades</b> en '+radioKm+' km').openPopup();return;}
      if(lazoOn){if(!lazoA){lazoA=e.latlng;showTool('Toca la esquina opuesta');}else{var b=L.latLngBounds(lazoA,e.latlng);if(lazoRect)mapa.removeLayer(lazoRect);lazoRect=L.rectangle(b,{color:'#1f7a8c',weight:2,fillOpacity:.06}).addTo(mapa);filtrados=DATOS.filter(function(r){return r.lat&&r.lon&&b.contains([r.lat,r.lon]);});render();pintarMapa();lazoRect.bindPopup('<b>'+filtrados.length+' comunidades</b> seleccionadas').openPopup();lazoOn=false;lazoA=null;$id('btnLazo').classList.remove('on');cancelTool();}return;}
    });
  },2500);
  /* renderListaProgramas */
  var _rp=window.renderListaProgramas;
  window.renderListaProgramas=function(){_rp();setTimeout(addProgExtras,350);};
}

/* ════════════════════ COLOR MAPA ════════════════════ */
function getColorMapa(r){
  var mode=($id('colorMode')||{value:'tipo'}).value;
  if(mode==='tipo')return r.tipo==='Dispersa'?'#5c8a3a':'#1f7a8c';
  var a=pctA(r),s=pctS(r),p=r.pT||0;
  if(mode==='agua')return a>=60?'#3a8a40':a>=30?'#e8a020':'#c44536';
  if(mode==='sanea')return s<=25?'#3a8a40':s<=60?'#e8a020':'#c44536';
  if(mode==='pob')return p>=500?'#1f3a8c':p>=200?'#1f7a8c':p>=50?'#3ab8c8':'#8acfdf';
  return '#1f7a8c';
}
function actualizarLey(){
  var el=$id('mapaLey');if(!el)return;
  var mode=($id('colorMode')||{value:'tipo'}).value;
  var M={tipo:[['#5c8a3a','Dispersa'],['#1f7a8c','Amanzanada']],agua:[['#c44536','<30%'],['#e8a020','30-60%'],['#3a8a40','>60%']],sanea:[['#3a8a40','<25%'],['#e8a020','25-60%'],['#c44536','>60%']],pob:[['#8acfdf','<50'],['#3ab8c8','50-200'],['#1f7a8c','200-500'],['#1f3a8c','>500']]};
  el.innerHTML=(M[mode]||[]).map(function(x){return '<span class="ley-i"><span class="ley-d" style="background:'+x[0]+'"></span>'+x[1]+'</span>';}).join('');
}
window.actualizarColorMapa=function(){actualizarLey();pintarMapa();};
window.toggleColorBar=function(){var b=$id('colorBar');if(!b)return;b.classList.toggle('vis');$id('btnColor').classList.toggle('on');if(b.classList.contains('vis'))actualizarLey();};

function showTool(txt,extras){
  var tb=$id('toolBar');if(!tb)return;
  $id('toolTxt').textContent=txt;
  ['radioInp','radioOkBtn','heatMode'].forEach(function(id){var el=$id(id);if(el)el.style.display='none';});
  if(extras)extras.forEach(function(id){var el=$id(id);if(el)el.style.display='';});
  tb.classList.add('vis');
}
window.cancelTool=function(){
  medirOn=false;lazoOn=false;radioWait=false;poiMode=false;
  ['btnMedir','btnLazo','btnRadio','btnHeat'].forEach(function(id){var el=$id(id);if(el)el.classList.remove('on');});
  var tb=$id('toolBar');if(tb)tb.classList.remove('vis');
};
window.miUbicacion=function(){
  var btn=$id('btnGps');if(btn)btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(function(p){
    if(btn)btn.textContent='📍';mapa.setView([p.coords.latitude,p.coords.longitude],13);
    L.circleMarker([p.coords.latitude,p.coords.longitude],{radius:9,color:'#fff',weight:2.5,fillColor:'#1f7a8c',fillOpacity:.95}).bindPopup('<b>Tu ubicación</b><br>'+p.coords.latitude.toFixed(5)+', '+p.coords.longitude.toFixed(5)).addTo(mapa).openPopup();
  },function(){if(btn)btn.textContent='📍';alert('No se pudo obtener GPS.');},{enableHighAccuracy:true,timeout:12000});
};

/* ════════════════════ GITHUB SYNC ════════════════════════════════
   Guarda/carga los programas en tu repositorio de GitHub.
   Requiere un Personal Access Token con permiso "repo".
   ══════════════════════════════════════════════════════════════ */

/* — helpers base64 con soporte UTF-8 (caracteres españoles) — */
function b64enc(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function b64dec(str){
  return decodeURIComponent(escape(atob(str)));
}

/* — config almacenada en localStorage — */
function ghConf(){
  return {
    token : lsGet('gh_token')||'',
    repo  : lsGet('gh_repo') ||'',   // "usuario/repositorio"
    file  : lsGet('gh_file') ||'programas.json'
  };
}

/* — mostrar indicador de estado en header — */
function ghStatus(txt,color){
  var el=$id('ghStatusIco');
  if(!el)return;
  el.textContent=txt;
  el.style.background=color||'var(--muted)';
  el.style.display='flex';
  if(color==='var(--verde)')setTimeout(function(){el.style.display='none';},3000);
}

/* — abrir/cerrar panel config — */
window.abrirGHConfig=function(){
  var c=ghConf();
  $id('ghTokenInp').value=c.token;
  $id('ghRepoInp').value=c.repo;
  $id('ghFileInp').value=c.file||'programas.json';
  $id('ghMsgStatus').textContent='';
  $id('ghOv').classList.add('activo');
};
window.cerrarGHConfig=function(){$id('ghOv').classList.remove('activo');};

/* — guardar config y probar — */
window.guardarConfigGH=function(){
  lsSet('gh_token',$id('ghTokenInp').value.trim());
  lsSet('gh_repo', $id('ghRepoInp').value.trim());
  lsSet('gh_file', $id('ghFileInp').value.trim()||'programas.json');
  $id('ghMsgStatus').textContent='✅ Configuración guardada';
  $id('ghMsgStatus').style.color='var(--verde)';
};
window.probarGH=async function(){
  var c=ghConf();
  if(!c.token||!c.repo){$id('ghMsgStatus').textContent='⚠️ Completá el token y el repositorio';$id('ghMsgStatus').style.color='var(--sol)';return;}
  $id('ghMsgStatus').textContent='🔄 Probando conexión…';$id('ghMsgStatus').style.color='var(--muted)';
  try{
    var r=await fetch('https://api.github.com/repos/'+c.repo,{headers:{'Authorization':'token '+c.token}});
    if(r.ok){$id('ghMsgStatus').textContent='✅ Conectado — repositorio accesible';$id('ghMsgStatus').style.color='var(--verde)';}
    else{var e=await r.json();$id('ghMsgStatus').textContent='❌ Error: '+(e.message||r.status);$id('ghMsgStatus').style.color='var(--rojo)';}
  }catch(e){$id('ghMsgStatus').textContent='❌ Sin conexión a internet';$id('ghMsgStatus').style.color='var(--rojo)';}
};

/* — subir programas a GitHub — */
window.syncGitHub=async function(){
  var c=ghConf();
  if(!c.token||!c.repo){return false;}
  ghStatus('⏳','var(--sol)');
  try{
    var content=b64enc(JSON.stringify({
      v:1,
      actualizado:new Date().toISOString(),
      programas:window.programas
    },null,2));
    var url='https://api.github.com/repos/'+c.repo+'/contents/'+c.file;
    var headers={'Authorization':'token '+c.token,'Content-Type':'application/json'};
    /* 1 — leer SHA actual (si el archivo ya existe) */
    var sha=null;
    try{
      var rGet=await fetch(url,{headers:headers});
      if(rGet.ok){var dGet=await rGet.json();sha=dGet.sha;}
    }catch(e){}
    /* 2 — crear o actualizar el archivo */
    var body={message:'Actualizar programas '+new Date().toLocaleDateString('es-BO'),content:content};
    if(sha)body.sha=sha;
    var rPut=await fetch(url,{method:'PUT',headers:headers,body:JSON.stringify(body)});
    if(rPut.ok){
      ghStatus('✅','var(--verde)');
      lsSet('gh_last_sync',new Date().toISOString());
      return true;
    }else{
      var err=await rPut.json();
      ghStatus('❌','var(--rojo)');
      console.error('GitHub sync error:',err.message);
      return false;
    }
  }catch(e){ghStatus('❌','var(--rojo)');console.error('GitHub sync:',e);return false;}
};

/* — descargar programas desde GitHub — */
window.cargarDesdeGH=async function(){
  var c=ghConf();
  if(!c.token||!c.repo){alert('Configurá el token y repositorio primero (⚙️ en el encabezado).');return;}
  ghStatus('⏳','var(--sol)');
  try{
    var url='https://api.github.com/repos/'+c.repo+'/contents/'+c.file;
    var r=await fetch(url,{headers:{'Authorization':'token '+c.token}});
    if(!r.ok){var e=await r.json();alert('Error al cargar: '+(e.message||r.status));ghStatus('❌','var(--rojo)');return;}
    var d=await r.json();
    var json=JSON.parse(b64dec(d.content));
    var remoteProg=json.programas||json;
    var keys=Object.keys(remoteProg);
    if(!keys.length){alert('El archivo en GitHub no tiene programas.');return;}
    if(!confirm('Se encontraron '+keys.length+' programa(s) en GitHub.\n\n¿Combinar con los programas locales?\n(Los programas con el mismo ID serán sobreescritos por los de GitHub)'))return;
    keys.forEach(function(k){window.programas[k]=remoteProg[k];});
    window.guardarProgramas&&window.guardarProgramas();
    window.renderProgramas&&window.renderProgramas();
    ghStatus('✅','var(--verde)');
    alert('✅ '+keys.length+' programa(s) cargados desde GitHub.');
  }catch(e){ghStatus('❌','var(--rojo)');alert('Error: '+e.message);}
};

/* — inyectar HTML del panel de config y botones — */
function injectGitHub(){
  /* botón ⚙️ en header */
  var hb=$q('header .hdr-btn')&&$q('header .hdr-btn').parentNode;
  if(hb&&!$id('btnGH')){
    var bg=document.createElement('button');
    bg.id='btnGH';bg.className='hdr-btn';bg.title='Sincronizar con GitHub';
    bg.innerHTML='⚙️<span class="hdr-bdg" id="ghStatusIco" style="display:none;width:auto;border-radius:4px;padding:0 3px;font-size:.46rem;white-space:nowrap">⏳</span>';
    bg.onclick=abrirGHConfig;
    hb.insertBefore(bg,hb.firstChild);
  }
  /* panel configuración */
  if(!$id('ghOv')){
    var d=document.createElement('div');
    d.innerHTML=
    '<div class="pnl-ov" id="ghOv" onclick="if(event.target.id===\'ghOv\')cerrarGHConfig()">'+
      '<div class="pnl-card">'+
        '<div class="pnl-handle"></div>'+
        '<div class="pnl-head"><span style="font-weight:700;font-size:.9rem">⚙️ Sincronización GitHub</span></div>'+
        '<div class="pnl-body">'+
          '<div style="font-size:.78rem;color:var(--muted);margin-bottom:12px;line-height:1.5">'+
            'Tus programas se guardarán automáticamente en tu repositorio de GitHub cada vez que presionés <b>Guardar</b>.'+
          '</div>'+
          /* Token */
          '<div class="poi-field"><label>Token de GitHub</label>'+
            '<input type="password" id="ghTokenInp" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="font-family:monospace">'+
            '<div style="font-size:.68rem;color:var(--muted);margin-top:3px">'+
              '→ github.com → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token → tildar <b>repo</b>'+
            '</div>'+
          '</div>'+
          /* Repo */
          '<div class="poi-field"><label>Repositorio (usuario/nombre)</label>'+
            '<input type="text" id="ghRepoInp" placeholder="erick-padilla/censo-bolivia">'+
          '</div>'+
          /* Archivo */
          '<div class="poi-field"><label>Nombre del archivo en el repo</label>'+
            '<input type="text" id="ghFileInp" value="programas.json" placeholder="programas.json">'+
          '</div>'+
          '<div id="ghMsgStatus" style="font-size:.8rem;margin:8px 0;font-weight:600"></div>'+
          '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">'+
            '<button onclick="probarGH()" style="padding:8px 14px;border:1px solid var(--agua);border-radius:9px;color:var(--agua);background:transparent;font-weight:700;font-size:.8rem;cursor:pointer">🔗 Probar</button>'+
            '<button onclick="guardarConfigGH()" style="padding:8px 14px;background:var(--agua);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:.8rem;cursor:pointer">💾 Guardar config</button>'+
            '<button onclick="cargarDesdeGH()" style="padding:8px 14px;border:1px solid var(--verde);border-radius:9px;color:var(--verde);background:transparent;font-weight:700;font-size:.8rem;cursor:pointer">⬇ Cargar desde GitHub</button>'+
            '<button onclick="syncGitHub()" style="padding:8px 14px;background:var(--verde);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:.8rem;cursor:pointer">⬆ Subir ahora</button>'+
          '</div>'+
          /* Último sync */
          '<div id="ghLastSync" style="font-size:.7rem;color:var(--muted)"></div>'+
          '<div style="margin-top:12px;padding:10px;background:var(--agua-l);border-radius:9px;font-size:.72rem;color:var(--agua-d);line-height:1.5">'+
            '<b>⚠️ Seguridad:</b> El token se guarda solo en este dispositivo (localStorage). '+
            'Nunca compartas el HTML con el token visible. Si usás GitHub Pages, el token no queda expuesto en el código publicado porque está en el navegador.'+
          '</div>'+
        '</div>'+
        '<div class="pnl-foot"><button class="btn-cerrar-pnl" onclick="cerrarGHConfig()">✕  Cerrar</button></div>'+
      '</div>'+
    '</div>';
    document.body.appendChild(d);
    /* mostrar fecha del último sync */
    var ls=lsGet('gh_last_sync');
    if(ls&&$id('ghLastSync'))$id('ghLastSync').textContent='Último sync: '+new Date(ls).toLocaleString('es-BO');
  }
  /* botón "Guardar y sincronizar" en programas */
  /* interceptar guardarProgramas para auto-sync */
  if(!window._ghHooked){
    window._ghHooked=true;
    var _gp=window.guardarProgramas;
    window.guardarProgramas=function(){
      if(_gp)_gp();
      var c=ghConf();
      if(c.token&&c.repo){
        syncGitHub().then(function(ok){
          if($id('ghLastSync')&&ok)$id('ghLastSync').textContent='Último sync: '+new Date().toLocaleString('es-BO');
        });
      }
    };
  }
}

  var c=ghConf();
